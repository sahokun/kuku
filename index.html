<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="portrait">
  <title>九九がくしゅうアプリ</title>
  
  <!--
  ゲーム要件:
  ・九九の問題がランダムで出る（例: 2×2=?）
  ・問題表示と同時に読み上げ音声が流れる（例: 「ににんが」）
  ・1-9（および0）のボタンで答えを入力して答える
  ・合ってたら⚪︎で1点、間違ってたら✖️で0点
  ・合ってても間違えても正解の読み上げ音声が流れる（例: 「し」）
  ・モード: 1-9の段の個別モード、1-3、3-5、6-9、1-4、5-9、1-9の段モード
  ・タイトル画面、スコア画面がある
  ・デザイン: KAWAIIカルチャー、ゆめかわいい、パステルカラー、丸ゴシック
  ・5問目と10問目は逆問題: 答えが表示され、式（かけ算の数）を穴埋めで入力する
  ・全問題で九九の読みがなを表示し、回答後に完全な読みが表示される
    - 通常問題: 式と共に「ににんが」を表示、回答後に「し」を公開
    - 逆問題: 答えと共に「し」を表示、回答後に「ににんが」を公開
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/title.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/feedback.css">
  <link rel="stylesheet" href="css/table.css">
  <link rel="stylesheet" href="css/result.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js"></script>
</head>
<body>

  <div id="app">
    <div class="scene-backdrop" aria-hidden="true">
      <div class="sky-ribbon"></div>
      <div class="warp-grid"></div>
      <div class="floating-kuku">
        <span>2×3</span>
        <span>7×8</span>
        <span>4×6</span>
        <span>9×9</span>
        <span>5×5</span>
      </div>
    </div>
    <div id="burst-layer" aria-hidden="true"></div>
    <div id="screen-flash" class="screen-flash" aria-hidden="true"></div>
    <div id="mute-btn" class="mute-btn" onclick="toggleMute()">🔇</div>
    <!-- タイトル画面 -->
    <div id="title-screen" class="screen active">
      <h1>九九がくしゅうアプリ</h1>

      <div class="mode-section bgm-selector">
        <h2>おんがく</h2>
        <div class="bgm-grid">
          <button class="btn bgm-option bgm-active" onclick="selectSong(0)">ゆったり</button>
          <button class="btn bgm-option" onclick="selectSong(1)">わくわく</button>
          <button class="btn bgm-option" onclick="selectSong(2)">たのしい</button>
          <button class="btn bgm-option" onclick="selectSong(3)">キラキラ</button>
          <button class="btn bgm-option" onclick="selectSong(4)">ノリノリ</button>
        </div>
      </div>

      <div style="width: 100%; margin: 4px 0;">
        <button class="btn btn-primary" style="width: 100%; font-size: 0.85rem; padding: 10px;" onclick="showTable()">📖 九九のひょう</button>
      </div>

      <div class="mode-section">
        <div class="dan-header">
          <h2>だんをえらんでね</h2>
          <button id="combination-toggle" class="btn combination-btn" onclick="toggleCombinationMode()">くみあわせ</button>
        </div>
        <div class="mode-grid">
          <button class="btn" data-dan="1" onclick="handleDanClick(1)">1のだん</button>
          <button class="btn" data-dan="2" onclick="handleDanClick(2)">2のだん</button>
          <button class="btn" data-dan="3" onclick="handleDanClick(3)">3のだん</button>
          <button class="btn" data-dan="4" onclick="handleDanClick(4)">4のだん</button>
          <button class="btn" data-dan="5" onclick="handleDanClick(5)">5のだん</button>
          <button class="btn" data-dan="6" onclick="handleDanClick(6)">6のだん</button>
          <button class="btn" data-dan="7" onclick="handleDanClick(7)">7のだん</button>
          <button class="btn" data-dan="8" onclick="handleDanClick(8)">8のだん</button>
          <button class="btn" data-dan="9" onclick="handleDanClick(9)">9のだん</button>
        </div>
        <button id="combination-start" class="btn btn-primary combination-start" onclick="startCombinationGame()" style="display: none;" disabled>スタート</button>
      </div>

      <div class="mode-section">
        <h2>まとめて</h2>
        <div class="range-grid">
          <button class="btn btn-secondary" onclick="startGame('2-3')">2〜3のだん</button>
          <button class="btn btn-secondary" onclick="startGame('4-6')">4〜6のだん</button>
          <button class="btn btn-secondary" onclick="startGame('7-9')">7〜9のだん</button>
          <button class="btn btn-secondary" onclick="startGame('2-5')">2〜5のだん</button>
          <button class="btn btn-secondary" onclick="startGame('6-9')">6〜9のだん</button>
          <button class="btn btn-primary" style="grid-column: span 2;" onclick="startGame('1-9')">ぜんぶ (1〜9)</button>
          <button class="btn btn-secondary" style="grid-column: span 2;" onclick="showFreeSelect()">✏️ じゆうにえらぶ</button>
        </div>
      </div>

      <div class="settings-row">
        <span class="settings-label">もんだいすう</span>
        <div class="stepper">
          <button class="btn stepper-btn" onclick="changeQuestionCount(-1)">－</button>
          <span id="question-count-display">10</span>
          <button class="btn stepper-btn" onclick="changeQuestionCount(1)">＋</button>
        </div>
        <span class="settings-unit">もん</span>
      </div>

      <div class="mode-section bgm-selector">
        <h2>えんしゅつ</h2>
        <div class="fx-grid">
          <button id="fx-btn-new" class="btn fx-option fx-active" onclick="selectFx('new')">ごうか</button>
          <button id="fx-btn-legacy" class="btn fx-option" onclick="selectFx('legacy')">ふつう</button>
        </div>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-screen" class="screen">
      <div class="status-bar">
        <button class="btn" style="font-size: 0.65rem; padding: 4px 10px; margin: 0;" onclick="showTitle()">やめる</button>
        <span id="question-counter" class="status-bar-center">もんだい 1/10</span>
        <span class="status-right">
          <span id="score-display">スコア: 0</span>
          <span id="combo-display" class="combo-display">れんぞく: 0</span>
        </span>
      </div>

      <div class="power-stage" aria-hidden="true">
        <div class="stage-ring back"></div>
        <div class="stage-ring"></div>
        <div class="stage-comet"></div>
        <div class="stage-mini one" id="stage-left">?</div>
        <div class="stage-mini two" id="stage-right">?</div>
        <div class="stage-core" id="stage-number">GO</div>
      </div>

      <div class="question-area">
        <div id="question-text" class="question-text"></div>
        <div id="kuku-reading" class="kuku-reading"></div>
        <div id="answer-display" class="answer-display">&nbsp;</div>
      </div>

      <div class="numpad">
        <button class="num-btn" onclick="inputNum(7)">7</button>
        <button class="num-btn" onclick="inputNum(8)">8</button>
        <button class="num-btn" onclick="inputNum(9)">9</button>
        <button class="num-btn" onclick="inputNum(4)">4</button>
        <button class="num-btn" onclick="inputNum(5)">5</button>
        <button class="num-btn" onclick="inputNum(6)">6</button>
        <button class="num-btn" onclick="inputNum(1)">1</button>
        <button class="num-btn" onclick="inputNum(2)">2</button>
        <button class="num-btn" onclick="inputNum(3)">3</button>
        <button class="num-btn action-btn btn-clear" onclick="clearInput()">けす</button>
        <button class="num-btn" onclick="inputNum(0)">0</button>
        <button class="num-btn action-btn btn-enter" onclick="submitAnswer()">OK</button>
      </div>

    </div>

    <!-- フィードバック -->
    <div id="feedback-overlay">
      <div id="feedback-ring" class="feedback-ring"></div>
      <div id="feedback-ring-2" class="feedback-ring" style="transition-delay: 0.15s;"></div>
      <div id="feedback-icon" class="feedback-icon"></div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="screen">
      <h1>けっか</h1>
      <div class="score-board">
        <div class="score-text">あなたのスコア</div>
        <div id="final-score" class="final-score">10</div>
        <div id="perfect-msg" class="perfect-msg"></div>
      </div>
      <button class="btn btn-primary" onclick="showTitle()">もういっかい</button>
    </div>

    <!-- 自由選択画面 -->
    <div id="free-select-screen" class="screen">
      <h1>もんだいをえらぼう</h1>
      <div class="free-select-controls">
        <button class="btn btn-secondary" style="font-size: 0.7rem; padding: 5px 10px; min-width: auto;" onclick="selectAllFree()">すべてえらぶ</button>
        <button class="btn" style="font-size: 0.7rem; padding: 5px 10px; min-width: auto;" onclick="clearAllFree()">クリア</button>
        <span id="free-select-count">0もんえらびちゅう</span>
      </div>
      <div id="free-select-table" class="compact-kuku-table">
        <!-- JS で生成 -->
      </div>
      <div class="free-select-footer">
        <button class="btn btn-secondary" onclick="showTitle()">もどる</button>
        <button class="btn btn-primary" id="free-start-btn" onclick="startFreeGame()" disabled>スタート</button>
      </div>
    </div>

    <!-- 九九の表画面 -->
    <div id="table-screen" class="screen">
      <div class="table-header">
        <button class="btn" style="font-size: 0.65rem; padding: 4px 10px;" onclick="showTitle()">もどる</button>
        <h1 style="margin: 0; font-size: 1.1rem;">九九のひょう</h1>
        <div style="width: 50px;"></div>
      </div>

      <div id="table-content" class="table-content">
        <!-- 動的に生成 -->
      </div>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/game.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/title.js"></script>
  <script src="js/free-select.js"></script>
  <script src="js/table.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/tone-engines.js"></script>
  <script src="js/se.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
