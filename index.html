<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="portrait">
  <title>九九学習アプリ</title>
  
  <!--
  ゲーム要件:
  ・九九の問題がランダムで出る（例: 2×2=?）
  ・問題表示と同時に読み上げ音声が流れる（例: 「ににんが」）
  ・1-9（および0）のボタンで答えを入力して答える
  ・合ってたら⚪︎で1点、間違ってたら✖️で0点
  ・合ってても間違えても正解の読み上げ音声が流れる（例: 「し」）
  ・モード: 1-9の段の個別モード、1-3、3-5、6-9、1-4、5-9、1-9の段モード
  ・タイトル画面、スコア画面がある
  ・デザイン: KAWAIIカルチャー、ゆめかわいい、パステルカラー、丸ゴシック
  ・5問目と10問目は逆問題: 答えが表示され、式（かけ算の数）を穴埋めで入力する
  ・全問題で九九の読みがなを表示し、回答後に完全な読みが表示される
    - 通常問題: 式と共に「ににんが」を表示、回答後に「し」を公開
    - 逆問題: 答えと共に「し」を表示、回答後に「ににんが」を公開
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #FFF0F5; /* Lavender Blush */
      --main-pink: #FF69B4; /* Hot Pink */
      --pastel-purple: #9370DB; /* Medium Purple */
      --mint: #4ECDC4;
      --gold: #FFD700;
      --sky: #65D6FF;
      --coral: #FF7A90;
      --lime: #A8F04F;
      --deep: #3B247C;
      --text-color: #555;
      --white: #ffffff;
      --shadow: 0 4px 0 rgba(0,0,0,0.1);
      --btn-shadow: 0 6px 0 rgba(0,0,0,0.15);
      --btn-active-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.9) 0 8%, transparent 26%),
        linear-gradient(135deg, #ffeaf6 0%, #d9f8ff 42%, #fff4a8 100%);
      background-size: 160% 160%;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      color: var(--text-color);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      animation: dreamySky 12s ease-in-out infinite;
    }

    #app {
      width: 100%;
      height: 100%;
      max-width: 500px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.1)),
        radial-gradient(circle at 10% 20%, rgba(255, 105, 180, 0.22) 0%, transparent 24%),
        radial-gradient(circle at 90% 80%, rgba(78, 205, 196, 0.22) 0%, transparent 24%);
    }

    #app::before {
      content: "";
      position: absolute;
      inset: -35%;
      z-index: 0;
      pointer-events: none;
      background:
        conic-gradient(from 40deg, rgba(255, 122, 144, 0.2), rgba(101, 214, 255, 0.2), rgba(168, 240, 79, 0.16), rgba(255, 215, 0, 0.2), rgba(255, 122, 144, 0.2));
      filter: blur(18px);
      opacity: 0.9;
      animation: colorSpin 16s linear infinite;
    }

    .scene-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      perspective: 720px;
      transform-style: preserve-3d;
    }

    .sky-ribbon {
      position: absolute;
      left: 50%;
      top: 5%;
      width: 88%;
      height: 34%;
      border: 14px solid rgba(255, 255, 255, 0.45);
      border-left-color: rgba(255, 105, 180, 0.28);
      border-right-color: rgba(78, 205, 196, 0.32);
      border-radius: 50%;
      transform: translateX(-50%) rotateX(58deg) rotateZ(-12deg);
      filter: drop-shadow(0 0 22px rgba(255, 255, 255, 0.65));
      animation: ribbonRoll 7s ease-in-out infinite;
    }

    .warp-grid {
      position: absolute;
      left: -18%;
      right: -18%;
      bottom: -17%;
      height: 48%;
      background-image:
        linear-gradient(rgba(59, 36, 124, 0.22) 2px, transparent 2px),
        linear-gradient(90deg, rgba(59, 36, 124, 0.2) 2px, transparent 2px);
      background-size: 34px 34px;
      transform: rotateX(64deg) translateZ(-60px);
      transform-origin: center bottom;
      opacity: 0.5;
      animation: gridRun 1.4s linear infinite;
    }

    .floating-kuku span {
      position: absolute;
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--deep);
      font-size: 1.1rem;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(59, 36, 124, 0.14), inset 0 0 0 2px rgba(255,255,255,0.7);
      transform-style: preserve-3d;
      animation: floatCube 5.5s ease-in-out infinite;
    }

    .floating-kuku span:nth-child(1) { left: 5%; top: 12%; animation-delay: -0.2s; }
    .floating-kuku span:nth-child(2) { right: 4%; top: 16%; animation-delay: -1.3s; }
    .floating-kuku span:nth-child(3) { left: 9%; bottom: 18%; animation-delay: -2.2s; }
    .floating-kuku span:nth-child(4) { right: 9%; bottom: 20%; animation-delay: -3.1s; }
    .floating-kuku span:nth-child(5) { left: 43%; top: 7%; animation-delay: -4s; }

    #burst-layer {
      position: absolute;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      left: var(--left);
      top: var(--top);
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      color: var(--spark-color);
      font-size: var(--spark-size);
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(255,255,255,0.9), 0 0 14px currentColor;
      transform: translate3d(-50%, -50%, 0) scale(0.5) rotate(0deg);
      animation: sparkFly var(--spark-life) cubic-bezier(0.12, 0.75, 0.2, 1) forwards;
    }

    #app.hit-correct .question-area {
      animation: correctPunch 0.62s cubic-bezier(0.2, 1.4, 0.3, 1);
    }

    #app.hit-incorrect .question-area {
      animation: wrongShake 0.42s ease-in-out;
    }

    #app.combo-fever .sky-ribbon {
      border-top-color: rgba(255, 215, 0, 0.75);
      filter: drop-shadow(0 0 28px rgba(255, 215, 0, 0.6));
      animation-duration: 3.8s;
    }

    #app.combo-fever .warp-grid {
      opacity: 0.78;
      animation-duration: 0.78s;
    }

    #app[data-screen="game"] .floating-kuku span {
      animation-duration: 3.9s;
    }

    @keyframes dreamySky {
      0%, 100% { background-position: 0% 45%; }
      50% { background-position: 100% 55%; }
    }

    @keyframes colorSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes ribbonRoll {
      0%, 100% { transform: translateX(-50%) rotateX(58deg) rotateZ(-12deg) translateY(0); }
      50% { transform: translateX(-50%) rotateX(64deg) rotateZ(10deg) translateY(12px); }
    }

    @keyframes gridRun {
      to { background-position: 0 34px, 34px 0; }
    }

    @keyframes floatCube {
      0%, 100% { transform: translate3d(0, 0, 16px) rotateX(12deg) rotateY(-18deg); }
      50% { transform: translate3d(0, -18px, 70px) rotateX(-18deg) rotateY(24deg) rotateZ(8deg); }
    }

    @keyframes sparkFly {
      0% { opacity: 1; transform: translate3d(-50%, -50%, 0) scale(0.45) rotate(0deg); }
      72% { opacity: 1; }
      100% { opacity: 0; transform: translate3d(calc(var(--x) - 50%), calc(var(--y) - 50%), 0) scale(1.35) rotate(var(--spin)); }
    }

    @keyframes correctPunch {
      0% { transform: rotateX(0deg) scale(1); }
      42% { transform: rotateX(10deg) scale(1.055); }
      100% { transform: rotateX(0deg) scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      22% { transform: translateX(-10px) rotateZ(-1.5deg); }
      48% { transform: translateX(8px) rotateZ(1.5deg); }
      72% { transform: translateX(-5px) rotateZ(-1deg); }
    }

    /* 共通スタイル */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 3;
    }

    h1 {
      font-size: 1.4rem;
      color: var(--main-pink);
      text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1);
      margin: 6px 0;
      text-align: center;
    }

    h2 {
      color: var(--pastel-purple);
      margin: 3px 0;
      font-size: 0.85rem;
    }

    .btn {
      background-color: var(--white);
      border: 2px solid var(--main-pink);
      border-radius: 50px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      color: var(--main-pink);
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      margin: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 65px;
      transform: translateZ(0);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: var(--btn-active-shadow);
    }

    .btn-primary {
      background-color: var(--main-pink);
      color: var(--white);
      border-color: var(--white);
    }

    .btn-secondary {
      background-color: var(--mint);
      color: var(--white);
      border-color: var(--white);
    }

    /* タイトル画面 */
    #title-screen {
      justify-content: flex-start;
    }

    .mode-section {
      width: 100%;
      background: rgba(255,255,255,0.72);
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 8px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(59, 36, 124, 0.08), inset 0 0 0 1px rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .mode-grid .btn {
      min-width: auto;
      width: 100%;
      padding: 5px 0;
      font-size: 0.7rem;
      border-radius: 10px;
    }

    .range-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }

    /* ゲーム画面 */
    #game-screen {
      justify-content: flex-start;
      gap: 6px;
    }

    .status-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--pastel-purple);
      padding: 0 52px 0 8px;
      position: relative;
    }

    .status-bar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .status-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      gap: 2px;
      min-width: 72px;
    }

    .combo-display {
      color: var(--coral);
      font-size: 0.66rem;
      text-shadow: 0 1px 0 #fff;
    }

    .power-stage {
      width: 100%;
      min-height: clamp(88px, 18vh, 130px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      perspective: 780px;
      transform-style: preserve-3d;
      margin: 0 0 -4px;
    }

    .stage-core {
      position: relative;
      width: clamp(82px, 24vw, 112px);
      height: clamp(82px, 24vw, 112px);
      display: grid;
      place-items: center;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.9), rgba(255,255,255,0.18)),
        conic-gradient(from 120deg, var(--main-pink), var(--sky), var(--lime), var(--gold), var(--main-pink));
      color: #fff;
      font-size: clamp(1.6rem, 8vw, 2.7rem);
      font-weight: 900;
      text-shadow: 0 3px 0 rgba(59, 36, 124, 0.22), 0 0 18px rgba(255,255,255,0.9);
      box-shadow: 0 18px 42px rgba(59, 36, 124, 0.22), inset 0 0 0 3px rgba(255,255,255,0.62);
      transform-style: preserve-3d;
      animation: coreFloat 2.4s ease-in-out infinite;
    }

    .stage-core::before,
    .stage-core::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.6);
      transform: translateZ(-18px) rotate(10deg);
    }

    .stage-core::after {
      inset: -10px;
      border-color: rgba(255, 215, 0, 0.48);
      transform: translateZ(-34px) rotate(-14deg);
    }

    .stage-ring {
      position: absolute;
      width: min(78vw, 360px);
      height: clamp(48px, 12vh, 72px);
      border: 8px solid rgba(255,255,255,0.58);
      border-left-color: rgba(255, 105, 180, 0.6);
      border-right-color: rgba(78, 205, 196, 0.65);
      border-radius: 50%;
      transform: rotateX(70deg) rotateZ(0deg);
      animation: stageRing 2.2s linear infinite;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.7));
    }

    .stage-ring.back {
      width: min(62vw, 290px);
      height: clamp(42px, 10vh, 64px);
      border-width: 5px;
      opacity: 0.6;
      animation-direction: reverse;
      animation-duration: 3.4s;
    }

    .stage-comet {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 8px rgba(255,215,0,0.22), 0 0 28px rgba(255,215,0,0.8);
      transform-origin: 108px 50%;
      animation: cometRun 1.7s linear infinite;
    }

    .stage-mini {
      position: absolute;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: rgba(255,255,255,0.76);
      color: var(--pastel-purple);
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(59,36,124,0.12);
      animation: miniHop 1.7s ease-in-out infinite;
    }

    .stage-mini.one { left: 18%; top: 20%; animation-delay: -0.4s; }
    .stage-mini.two { right: 18%; bottom: 18%; animation-delay: -1s; }

    #app.combo-fever .stage-core {
      animation-duration: 1.2s;
      box-shadow: 0 18px 52px rgba(255, 105, 180, 0.36), 0 0 36px rgba(255, 215, 0, 0.42), inset 0 0 0 3px rgba(255,255,255,0.68);
    }

    @keyframes coreFloat {
      0%, 100% { transform: rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px); }
      50% { transform: rotateX(-8deg) rotateY(18deg) translateY(-10px) translateZ(44px); }
    }

    @keyframes stageRing {
      to { transform: rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes cometRun {
      0% { transform: rotate(0deg) translateX(108px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(108px) rotate(-360deg); }
    }

    @keyframes miniHop {
      0%, 100% { transform: translateY(0) rotateZ(-6deg); }
      50% { transform: translateY(-12px) rotateZ(8deg); }
    }

    .question-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin: 6px 0;
      min-height: 7rem;
      position: relative;
      border-radius: 18px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 16px 34px rgba(59,36,124,0.12), inset 0 0 0 2px rgba(255,255,255,0.85);
      transform-style: preserve-3d;
      backdrop-filter: blur(8px);
    }

    .question-area::before {
      content: "";
      position: absolute;
      inset: -7px;
      z-index: -1;
      border-radius: 24px;
      background: conic-gradient(from 0deg, rgba(255,105,180,0.55), rgba(101,214,255,0.45), rgba(255,215,0,0.45), rgba(168,240,79,0.42), rgba(255,105,180,0.55));
      opacity: 0.68;
      filter: blur(1px);
      animation: questionGlow 4s linear infinite;
    }

    @keyframes questionGlow {
      to { transform: rotate(360deg); }
    }

    .question-text {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--main-pink);
      text-shadow: 2px 2px 0 #fff, 0 10px 22px rgba(255, 105, 180, 0.22);
      margin-bottom: 6px;
      letter-spacing: 1px;
      min-height: 2.5rem;
    }

    .answer-display {
      font-size: 1.6rem;
      height: 2rem;
      line-height: 2rem;
      color: var(--pastel-purple);
      border-bottom: 2px dashed var(--mint);
      padding: 0 12px;
      min-width: 80px;
      text-align: center;
      background: rgba(255,255,255,0.5);
      border-radius: 6px;
      box-shadow: inset 0 -4px 0 rgba(78, 205, 196, 0.12);
    }

    /* 九九よみがな表示 */
    .kuku-reading {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--pastel-purple);
      height: 1.6rem;
      line-height: 1.6rem;
      text-align: center;
      margin: 4px 0;
      letter-spacing: 2px;
      overflow: visible;
    }

    .kuku-blank {
      display: inline-block;
      min-width: 2em;
      border-bottom: 2px dashed var(--main-pink);
      margin: 0 2px;
      color: transparent;
    }

    .kuku-revealed {
      display: inline-block;
      color: var(--main-pink);
      font-weight: 900;
      animation: kukuReveal 0.3s ease-out;
    }

    @keyframes kukuReveal {
      from { opacity: 0; transform: scale(1.3); }
      to { opacity: 1; transform: scale(1); }
    }

    /* 式入力モード（Q5, Q10用） */
    .equation-display {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 1.8rem;
      font-weight: 900;
    }

    .equation-slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.2rem;
      height: 2.2rem;
      border: 2px dashed var(--mint);
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
      font-size: 1.6rem;
      color: var(--main-pink);
      font-weight: 900;
      transition: border-color 0.2s, background 0.2s;
    }

    .equation-slot.active-slot {
      border-color: var(--main-pink);
      background: rgba(255, 105, 180, 0.1);
      animation: slotPulse 1s infinite;
    }

    .equation-slot.filled-slot {
      border-style: solid;
      background: rgba(78, 205, 196, 0.15);
    }

    @keyframes slotPulse {
      0%, 100% { border-color: var(--main-pink); }
      50% { border-color: var(--mint); }
    }

    .equation-operator {
      color: var(--text-color);
      font-size: 1.4rem;
    }

    .equation-answer-part {
      color: var(--main-pink);
      font-weight: 900;
      font-size: 1.8rem;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 240px;
    }

    .num-btn {
      background:
        linear-gradient(145deg, rgba(255,255,255,1), rgba(236, 250, 255, 0.9));
      border: 2px solid var(--mint);
      color: var(--mint);
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--btn-shadow);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
    }

    .num-btn:hover {
      filter: saturate(1.15);
      transform: translateY(-2px) scale(1.02);
    }

    .num-btn:active {
      transform: translateY(4px);
      box-shadow: var(--btn-active-shadow);
      background-color: var(--mint);
      color: var(--white);
    }

    .action-btn {
      border-radius: 12px;
      aspect-ratio: auto;
      height: 100%;
      font-size: 0.75rem;
    }

    .btn-clear {
      border-color: #ffb7b2;
      color: #ffb7b2;
    }
    .btn-enter {
      background-color: var(--main-pink);
      color: white;
      border-color: white;
      grid-column: span 1;
    }

    /* フィードバックオーバーレイ */
    #feedback-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 70;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .feedback-icon {
      font-size: 8rem;
      font-weight: 900;

      font-size: 0.9rem;
      color: var(--text-color);
    }

      color: var(--main-pink);

      margin-top: 6px;

      right: 10px;

      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

      justify-content: flex-start;
    }

    .table-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .table-content {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      max-width: 450px;
    }

    .table-dan-section {
      display: flex;
      flex-direction: column;
    }

    .table-dan-title {
      font-weight: 900;
      font-size: 0.75rem;
      color: var(--main-pink);
      margin-bottom: 2px;
      padding: 3px 6px;
      background: rgba(255, 105, 180, 0.1);
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .play-dan-btn {
      font-size: 0.65rem;
      padding: 2px 6px;
      min-width: auto;
    }

    .table-row {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 3px;
      padding: 3px 6px;
      margin: 1px 0;
      background: white;
      border-radius: 3px;
      font-size: 0.7rem;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .table-row:hover {
      background: var(--mint);
      color: white;
    }

    .table-row.playing {
      background: var(--main-pink);
      color: white;
      border-color: var(--gold);
    }

    .table-row-left {
      font-weight: bold;
      color: var(--pastel-purple);
      font-size: 0.68rem;
    }

    .table-row:hover .table-row-left,
    .table-row.playing .table-row-left {
      color: white;
    }

    .table-row-right {
      font-weight: 900;
      font-size: 0.78rem;
    }

    .table-row-reading {
      font-size: 0.6rem;
      color: var(--pastel-purple);
      opacity: 0.7;
      margin-left: auto;
    }

    .table-row:hover .table-row-reading,
    .table-row.playing .table-row-reading {
      color: white;
      opacity: 0.9;
    }

    /* BGMセレクター */
    .bgm-selector {
      padding: 6px 8px;
    }
    .bgm-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .bgm-option {
      font-size: 0.6rem;
      padding: 4px 2px;
      min-width: auto;
      border-color: var(--pastel-purple);
      color: var(--pastel-purple);
      transition: all 0.2s;
    }
    .bgm-option.bgm-active {
      background-color: var(--pastel-purple);
      color: var(--white);
      border-color: var(--white);
    }

    /* くみあわせモード */
    .dan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 4px;
    }
    .dan-header h2 {
      margin: 0;
    }
    .combination-btn {
      font-size: 0.6rem;
      padding: 3px 8px;
      min-width: auto;
      border-color: var(--pastel-purple);
      color: var(--pastel-purple);
    }
    .dan-selected {
      background-color: var(--main-pink) !important;
      color: var(--white) !important;
      border-color: var(--gold) !important;
      box-shadow: 0 0 8px rgba(255, 105, 180, 0.4);
    }
    .combination-start {
      width: 100%;
      margin-top: 6px;
      font-size: 0.85rem;
      padding: 8px;
    }
    .combination-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* もんだいすう設定 */
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 4px 8px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .settings-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--pastel-purple);
    }
    .settings-unit {
      font-size: 0.75rem;
      color: var(--text-color);
    }
    .stepper {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stepper-btn {
      min-width: 32px;
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 1rem;
      border-radius: 50%;
    }
    #question-count-display {
      min-width: 36px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--main-pink);
    }

    /* 自由選択画面 */
    #free-select-screen {
      justify-content: flex-start;
    }
    .free-select-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin: 4px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    #free-select-count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--pastel-purple);
    }
    .compact-kuku-table {
      display: grid;
      grid-template-columns: 24px repeat(9, 1fr);
      gap: 3px;
      width: 100%;
      padding: 4px;
    }
    .ck-header {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--pastel-purple);
      font-weight: 700;
      height: 28px;
    }
    .ck-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      border-radius: 6px;
      background: #f0f0f0;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-color);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, transform 0.1s;
    }
    .ck-cell:active {
      transform: scale(0.92);
    }
    .ck-cell.selected {
      background: var(--main-pink);
      color: white;
    }
    .free-select-footer {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 8px;
      gap: 8px;
    }
    .free-select-footer .btn {
      flex: 1;
      font-size: 0.85rem;
      padding: 10px;
    }
    #free-start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-height: 620px) {
      .power-stage {
        min-height: 72px;
      }

      .stage-core {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        font-size: 1.5rem;
      }

      .stage-ring {
        width: 250px;
        height: 44px;
      }

      .stage-mini {
        width: 28px;
        height: 28px;
        font-size: 0.8rem;
      }

      .question-area {
        min-height: 6.4rem;
        margin: 2px 0;
      }

      .question-text {
        font-size: 2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

</head>

      </div>

      <div class="mode-section">
        <div class="dan-header">
          <h2>だんをえらんでね</h2>

        </div>
        <div class="mode-grid">
          <button class="btn" data-dan="1" onclick="handleDanClick(1)">1のだん</button>
          <button class="btn" data-dan="2" onclick="handleDanClick(2)">2のだん</button>

      </div>

      { a: 8, b: 1, q_read: "はちいちが", a_read: "はち" },
      { a: 8, b: 2, q_read: "はちに", a_read: "じゅうろく" },
      { a: 8, b: 3, q_read: "はちさん", a_read: "にじゅうし" },
      { a: 8, b: 4, q_read: "はちし", a_read: "さんじゅうに" },
      { a: 8, b: 5, q_read: "はちご", a_read: "しじゅう" },
      { a: 8, b: 6, q_read: "はちろく", a_read: "しじゅうはち" },
      { a: 8, b: 7, q_read: "はちしち", a_read: "ごじゅうろく" },
      { a: 8, b: 8, q_read: "はっぱ", a_read: "ろくじゅうし" },
      { a: 8, b: 9, q_read: "はっく", a_read: "しちじゅうに" },
      // 9の段
      { a: 9, b: 1, q_read: "くいちが", a_read: "く" },
      { a: 9, b: 2, q_read: "くに", a_read: "じゅうはち" },
      { a: 9, b: 3, q_read: "くさん", a_read: "にじゅうしち" },
      { a: 9, b: 4, q_read: "くし", a_read: "さんじゅうろく" },
      { a: 9, b: 5, q_read: "くご", a_read: "しじゅうご" },
      { a: 9, b: 6, q_read: "くろく", a_read: "ごじゅうし" },
      { a: 9, b: 7, q_read: "くしち", a_read: "ろくじゅうさん" },
      { a: 9, b: 8, q_read: "くは", a_read: "しちじゅうに" },
      { a: 9, b: 9, q_read: "くく", a_read: "はちじゅういち" },
    ];

    // ゲーム状態
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let streak = 0;
    let currentInput = "";
    let isProcessing = false;
    let currentQuestionType = "answer"; // "answer"（通常）or "equation"（逆問題: Q5, Q10）
    let equationInputB = "";
    let totalQuestions = parseInt(localStorage.getItem('kuku_question_count') || '10');

    // くみあわせモード
    let isCombinationMode = false;
    let selectedDans = new Set();

    // 自由選択モード
    let isFreeMode = false;
    let selectedFreeProblems = new Set(); // "a,b" 形式

    // 音声合成
    const synth = window.speechSynthesis;
    let voice = null;

    function initVoice() {
      const voices = synth.getVoices();
      // 日本語の音声を探す
      voice = voices.find(v => v.lang === 'ja-JP') || voices[0];
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = initVoice;
    }

    function speak(text) {
      if (synth.speaking) {
        synth.cancel();
      }
      const utterThis = new SpeechSynthesisUtterance(text);
      if (voice) utterThis.voice = voice;
      utterThis.lang = 'ja-JP';
      utterThis.rate = 1.0;
      utterThis.pitch = 1.2; // 子供向けに少し高め
      synth.speak(utterThis);
    }

    // 画面切り替え
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => {
        el.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
      document.getElementById('app').dataset.screen = screenId.replace('-screen', '');
    }

    // ゲーム開始
    function startGame(mode) {
      // 音声初期化（ユーザー操作トリガー）
      initVoice();
      initAudio();
      speak(""); // ダミー再生でアンロック

      isFreeMode = false;
      score = 0;
      streak = 0;
      document.getElementById('app').classList.remove('combo-fever', 'hit-correct', 'hit-incorrect');
      currentQuestionIndex = 0;
      currentInput = "";
      isProcessing = false;
      currentQuestionType = "answer";
      equationInputB = "";
      document.getElementById('question-text').textContent = '';
      document.getElementById('kuku-reading').innerHTML = '';
      document.getElementById('answer-display').textContent = '\u00A0';
      document.getElementById('answer-display').style.display = '';
      
      // 問題生成
      let candidates = [];

      if (mode.includes(',')) {
        // くみあわせモード: カンマ区切りの段リスト
        const dans = mode.split(',').map(Number);
        candidates = kukuData.filter(d => dans.includes(d.a));
      } else if (mode.includes('-')) {
        const [start, end] = mode.split('-').map(Number);
        candidates = kukuData.filter(d => d.a >= start && d.a <= end);
      } else {
        const target = Number(mode);
        candidates = kukuData.filter(d => d.a === target);
      }

      // ランダムに10問選ぶ（重複ありにするか？なしにするか？ -> なし推奨だが候補が少ない場合はあり）
      // シャッフルして先頭10個を取る
      currentQuestions = shuffleArray([...candidates]).slice(0, totalQuestions);
      // もし候補が10個未満なら（例：1つの段は9個しかない）、補充する
      while (currentQuestions.length < totalQuestions) {
        const randomQ = candidates[Math.floor(Math.random() * candidates.length)];
        currentQuestions.push(randomQ);
      }

      updateStatusBar();
      showScreen('game-screen');
      
      // 少し待ってから最初の問題を表示
      setTimeout(showNextQuestion, 500);
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function showNextQuestion() {
      if (currentQuestionIndex >= totalQuestions) {
        endGame();
        return;
      }

      const q = currentQuestions[currentQuestionIndex];
      const questionTextEl = document.getElementById('question-text');
      const answerDisplayEl = document.getElementById('answer-display');
      const kukuReadingEl = document.getElementById('kuku-reading');

      // 5問ごとに逆問題（自由選択モードでは逆問題なし）
      const isEquationType = !isFreeMode && ((currentQuestionIndex + 1) % 5 === 0);
      currentQuestionType = isEquationType ? "equation" : "answer";
      updateStage(q);

      // 入力状態リセット
      currentInput = "";
      equationInputB = "";

      if (currentQuestionType === "equation") {
        // 逆問題: 左の数と答えを表示し、右の数だけ穴埋め
        const answer = q.a * q.b;
        questionTextEl.innerHTML =
          '<div class="equation-display">' +
          '<span class="equation-answer-part">' + q.a + '</span>' +
          '<span class="equation-operator">&times;</span>' +
          '<span id="slot-b" class="equation-slot active-slot">?</span>' +
          '<span class="equation-operator">=</span>' +
          '<span class="equation-answer-part">' + answer + '</span>' +
          '</div>';

        // よみがな: 式部分が空欄、答え部分を表示
        kukuReadingEl.innerHTML =
          '<span class="kuku-blank">' + q.q_read + '</span>' +
          '<span>' + q.a_read + '</span>';

        // 通常の入力欄を非表示
        answerDisplayEl.style.display = 'none';

        // 「あなうめもんだい」を読み上げ
        speak("あなうめもんだい");
      } else {
        // 通常問題: 式を表示し、答えを入力させる
        questionTextEl.textContent = q.a + ' \u00d7 ' + q.b + ' = ?';

        // よみがな: 式部分を表示、答え部分が空欄
        kukuReadingEl.innerHTML =
          '<span>' + q.q_read + '</span>' +
          '<span class="kuku-blank">' + q.a_read + '</span>';

        // 通常の入力欄を表示
        answerDisplayEl.style.display = '';

        // 式の読みを読み上げ
        speak(q.q_read);
      }

      updateInputDisplay();
      updateStatusBar();
      isProcessing = false;
    }

    function updateStatusBar() {
      document.getElementById('question-counter').textContent = `もんだい ${currentQuestionIndex + 1}/${totalQuestions}`;
      document.getElementById('score-display').textContent = `スコア: ${score}`;
      document.getElementById('combo-display').textContent = `れんぞく: ${streak}`;
    }

    function updateStage(q) {
      const stageNumber = document.getElementById('stage-number');
      const stageLeft = document.getElementById('stage-left');
      const stageRight = document.getElementById('stage-right');
      if (!stageNumber || !q) return;

      stageNumber.textContent = currentQuestionType === "equation" ? `${q.a}×?` : `${q.a}×${q.b}`;
      stageLeft.textContent = q.a;
      stageRight.textContent = q.b;
      stageNumber.animate(
        [
          { transform: 'rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px) scale(0.88)' },
          { transform: 'rotateX(-8deg) rotateY(18deg) translateY(-10px) translateZ(44px) scale(1.08)' },
          { transform: 'rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px) scale(1)' }
        ],
        { duration: 520, easing: 'cubic-bezier(0.2, 1.4, 0.3, 1)' }
      );
    }

    function inputNum(num) {
      if (isProcessing) return;

      if (currentQuestionType === "equation") {
        // 逆問題: 右の数を1桁入力
        if (equationInputB !== "") return; // 入力済み
        equationInputB = String(num);
        updateEquationDisplay();
        playSe('btn');
      } else {
        // 通常問題
        if (currentInput === "0") currentInput = "";
        if (currentInput.length >= 2) return; // 2桁まで
        currentInput += num;
        updateInputDisplay();
        playSe('btn');
      }
    }

    function clearInput() {
      if (isProcessing) return;

      if (currentQuestionType === "equation") {
        equationInputB = "";
        updateEquationDisplay();
      } else {
        currentInput = "";
        updateInputDisplay();
      }
      playSe('cancel');
    }

    function updateInputDisplay() {
      const display = document.getElementById('answer-display');
      display.textContent = currentInput || '\u00A0'; // 空の場合は&nbsp;を表示
    }

    function updateEquationDisplay() {
      const slotB = document.getElementById('slot-b');
      if (!slotB) return;

      if (equationInputB !== "") {
        slotB.textContent = equationInputB;
        slotB.classList.remove('active-slot');
        slotB.classList.add('filled-slot');
      } else {
        slotB.textContent = '?';
        slotB.classList.remove('filled-slot');
        slotB.classList.add('active-slot');
      }
    }

    function submitAnswer() {
      if (isProcessing) return;

      const q = currentQuestions[currentQuestionIndex];
      const kukuReadingEl = document.getElementById('kuku-reading');

      if (currentQuestionType === "equation") {
        // 逆問題: 右の数の入力必須
        if (equationInputB === "") return;

        isProcessing = true;
        const userB = Number(equationInputB);

        // q.bと一致するか判定
        const isCorrect = (userB === q.b);

        if (isCorrect) {
          score++;
          streak++;
          showFeedback(true);
          playSe('correct');
        } else {
          streak = 0;
          showFeedback(false);
          playSe('incorrect');
        }
        updateStatusBar();

        // よみがな: 式部分(q_read)を公開して完成
        kukuReadingEl.innerHTML =
          '<span class="kuku-revealed">' + q.q_read + '</span>' +
          '<span>' + q.a_read + '</span>';

        // 正解の読み上げ
        setTimeout(() => {
          speak(q.q_read + q.a_read);
        }, 500);

        // 次の問題へ
        setTimeout(() => {
          currentQuestionIndex++;
          showNextQuestion();
        }, 2500);

      } else {
        // 通常問題
        if (currentInput === "") return;

        isProcessing = true;
        const userAnswer = Number(currentInput);
        const correctAnswer = q.a * q.b;
        const isCorrect = userAnswer === correctAnswer;

        if (isCorrect) {
          score++;
          streak++;
          showFeedback(true);
          playSe('correct');
        } else {
          streak = 0;
          showFeedback(false);
          playSe('incorrect');
        }
        updateStatusBar();

        // よみがな: 答え部分(a_read)を公開して完成
        kukuReadingEl.innerHTML =
          '<span>' + q.q_read + '</span>' +
          '<span class="kuku-revealed">' + q.a_read + '</span>';

        // 正解の読み上げ
        setTimeout(() => {
          speak(q.q_read + q.a_read);
        }, 500);

        // 次の問題へ
        setTimeout(() => {
          currentQuestionIndex++;
          showNextQuestion();
        }, 2500);
      }
    }

    function showFeedback(isCorrect) {
      const overlay = document.getElementById('feedback-overlay');
      const icon = document.getElementById('feedback-icon');
      const app = document.getElementById('app');
      
      overlay.style.opacity = 1;
      icon.textContent = isCorrect ? '⭕' : '❌';
      icon.className = 'feedback-icon ' + (isCorrect ? 'correct' : 'incorrect');
      app.classList.toggle('combo-fever', streak >= 3);
      app.classList.remove('hit-correct', 'hit-incorrect');
      void app.offsetWidth;
      app.classList.add(isCorrect ? 'hit-correct' : 'hit-incorrect');
      launchBurst(isCorrect, streak >= 3);
      
      // アニメーション
      requestAnimationFrame(() => {
        icon.style.transform = 'scale(1)';
      });

      setTimeout(() => {
        icon.style.transform = 'scale(0)';
        overlay.style.opacity = 0;
        app.classList.remove('hit-correct', 'hit-incorrect');
      }, 1500);
    }

    function launchBurst(isCorrect, isBig) {
      const layer = document.getElementById('burst-layer');
      const app = document.getElementById('app');
      if (!layer || !app) return;

      const appRect = app.getBoundingClientRect();
      const target = document.querySelector('.screen.active .question-area, .screen.active .score-board') || document.querySelector('.question-area');
      const questionRect = target.getBoundingClientRect();
      const centerX = questionRect.left - appRect.left + questionRect.width / 2;
      const centerY = questionRect.top - appRect.top + questionRect.height / 2;
      const count = isBig ? 42 : (isCorrect ? 28 : 18);
      const symbols = isCorrect ? ['★', '×', '+', '♪'] : ['×', '?', '！'];
      const colors = isCorrect
        ? ['#FFD700', '#FF69B4', '#4ECDC4', '#A8F04F', '#65D6FF']
        : ['#FF7A90', '#9370DB', '#FFD700'];

      for (let i = 0; i < count; i++) {
        const spark = document.createElement('span');
        const angle = (Math.PI * 2 * i / count) + Math.random() * 0.45;
        const distance = (isBig ? 180 : 120) + Math.random() * (isBig ? 120 : 70);
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance - Math.random() * 45;
        spark.className = 'spark';
        spark.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        spark.style.setProperty('--left', `${centerX}px`);
        spark.style.setProperty('--top', `${centerY}px`);
        spark.style.setProperty('--x', `${x}px`);
        spark.style.setProperty('--y', `${y}px`);
        spark.style.setProperty('--spin', `${(Math.random() * 720 - 360).toFixed(0)}deg`);
        spark.style.setProperty('--spark-color', colors[i % colors.length]);
        spark.style.setProperty('--spark-size', `${14 + Math.random() * (isBig ? 18 : 12)}px`);
        spark.style.setProperty('--spark-life', `${780 + Math.random() * 420}ms`);
        layer.appendChild(spark);
        setTimeout(() => spark.remove(), 1300);
      }
    }

    function endGame() {
      showScreen('result-screen');
      playSe('result');
      document.getElementById('app').classList.toggle('combo-fever', score === totalQuestions);
      setTimeout(() => {
        if (score > 0) launchBurst(true, score === totalQuestions);
      }, 180);
      document.getElementById('final-score').textContent = `${score} / ${totalQuestions}`;
      
      const msgEl = document.getElementById('perfect-msg');
      if (score === totalQuestions) {
        msgEl.textContent = "すごい！ぜんもんせいかい！";
        speak("すごい！ぜんもんせいかい！");
      } else if (score >= 7) {
        msgEl.textContent = "よくがんばったね！";
        speak("よくがんばったね！");
      } else {
        msgEl.textContent = "またチャレンジしてね！";
        speak("またチャレンジしてね！");
      }
    }

    function showTitle() {
      showScreen('title-screen');
      synth.cancel();
      playSe('cancel');
      stopTablePlayback();
      isFreeMode = false;
      streak = 0;
      document.getElementById('app').classList.remove('combo-fever', 'hit-correct', 'hit-incorrect');
      // くみあわせモードをリセット
      if (isCombinationMode) {
        toggleCombinationMode();
      }
    }

    // くみあわせモード
    function toggleCombinationMode() {
      isCombinationMode = !isCombinationMode;
      selectedDans.clear();

      const toggleBtn = document.getElementById('combination-toggle');
      const startBtn = document.getElementById('combination-start');
      const danButtons = document.querySelectorAll('.mode-grid .btn');

      toggleBtn.classList.toggle('btn-primary', isCombinationMode);
      toggleBtn.textContent = isCombinationMode ? 'くみあわせ ON' : 'くみあわせ';
      startBtn.style.display = isCombinationMode ? 'block' : 'none';
      startBtn.disabled = true;

      danButtons.forEach(btn => {
        btn.classList.remove('dan-selected');
      });

      playSe('btn');
    }

    function handleDanClick(dan) {
      if (!isCombinationMode) {
        startGame(String(dan));
        return;
      }

      const btn = document.querySelector(`.mode-grid .btn[data-dan="${dan}"]`);

      if (selectedDans.has(dan)) {
        selectedDans.delete(dan);
        btn.classList.remove('dan-selected');
      } else {
        selectedDans.add(dan);
        btn.classList.add('dan-selected');
      }

      const startBtn = document.getElementById('combination-start');
      startBtn.disabled = selectedDans.size === 0;

      playSe('btn');
    }

    function startCombinationGame() {
      if (selectedDans.size === 0) return;
      const mode = Array.from(selectedDans).sort().join(',');
      startGame(mode);
    }

    // もんだいすう設定
    function changeQuestionCount(delta) {
      totalQuestions = Math.min(99, Math.max(1, totalQuestions + delta));
      localStorage.setItem('kuku_question_count', totalQuestions);
      document.getElementById('question-count-display').textContent = totalQuestions;
      playSe('btn');
    }

    // 自由選択モード
    function showFreeSelect() {
      playSe('btn');
      renderFreeSelectTable();
      showScreen('free-select-screen');
    }

    function renderFreeSelectTable() {
      const container = document.getElementById('free-select-table');
      let html = '<div class="ck-header"></div>';
      for (let a = 1; a <= 9; a++) html += `<div class="ck-header">${a}</div>`;
      for (let b = 1; b <= 9; b++) {
        html += `<div class="ck-header">${b}</div>`;
        for (let a = 1; a <= 9; a++) {
          const key = `${a},${b}`;
          const sel = selectedFreeProblems.has(key) ? ' selected' : '';
          html += `<div class="ck-cell${sel}" onclick="toggleFreeCell(${a},${b})">${a * b}</div>`;
        }
      }
      container.innerHTML = html;
      updateFreeSelectUI();
    }

    function toggleFreeCell(a, b) {
      const key = `${a},${b}`;
      if (selectedFreeProblems.has(key)) selectedFreeProblems.delete(key);
      else selectedFreeProblems.add(key);
      renderFreeSelectTable();
      playSe('btn');
    }

    function updateFreeSelectUI() {
      const count = selectedFreeProblems.size;
      document.getElementById('free-select-count').textContent = `${count}もん選択中`;
      document.getElementById('free-start-btn').disabled = count === 0;
    }

    function selectAllFree() {
      for (let a = 1; a <= 9; a++)
        for (let b = 1; b <= 9; b++)
          selectedFreeProblems.add(`${a},${b}`);
      renderFreeSelectTable();
      playSe('btn');
    }

    function clearAllFree() {
      selectedFreeProblems.clear();
      renderFreeSelectTable();
      playSe('btn');
    }

    function startFreeGame() {
      if (selectedFreeProblems.size === 0) return;
      isFreeMode = true;

      const candidates = [...selectedFreeProblems].map(key => {
        const [a, b] = key.split(',').map(Number);
        return kukuData.find(d => d.a === a && d.b === b);
      }).filter(Boolean);

      currentQuestions = shuffleArray([...candidates]).slice(0, totalQuestions);
      while (currentQuestions.length < totalQuestions) {
        currentQuestions.push(...shuffleArray([...candidates]));
      }
      currentQuestions = currentQuestions.slice(0, totalQuestions);

      score = 0;
      streak = 0;
      document.getElementById('app').classList.remove('combo-fever', 'hit-correct', 'hit-incorrect');
      currentQuestionIndex = 0;
      currentInput = "";
      equationInputB = "";
      isProcessing = false;
      currentQuestionType = "answer";
      document.getElementById('question-text').textContent = '';
      document.getElementById('kuku-reading').innerHTML = '';
      document.getElementById('answer-display').textContent = '\u00A0';
      document.getElementById('answer-display').style.display = '';

      initVoice(); initAudio(); speak("");
      updateStatusBar();
      showScreen('game-screen');
      setTimeout(showNextQuestion, 500);
    }

    // 九九の表モード
    let isPlayingTable = false;
    let tablePlaybackData = [];
    let tablePlaybackIndex = 0;

    function showTable() {
      showScreen('table-screen');
      renderAllTable();
    }

    function renderAllTable() {
      const container = document.getElementById('table-content');
      container.innerHTML = '';

      for (let dan = 1; dan <= 9; dan++) {
        const tableData = kukuData.filter(d => d.a === dan);

        const section = document.createElement('div');
        section.className = 'table-dan-section';

        const title = document.createElement('div');
        title.className = 'table-dan-title';
        title.innerHTML = `
          <span>${dan}のだん</span>
          <button class="btn btn-secondary play-dan-btn" onclick="playDan(${dan})">🔊</button>
        `;

        section.appendChild(title);

        tableData.forEach((data, index) => {
          const row = document.createElement('div');
          row.className = 'table-row';
          row.id = `table-row-${dan}-${index}`;
          row.onclick = () => playTableRow(data, dan, index);

          const left = document.createElement('span');
          left.className = 'table-row-left';
          left.textContent = `${data.a} × ${data.b} =`;

          const right = document.createElement('span');
          right.className = 'table-row-right';
          right.textContent = data.a * data.b;

          const reading = document.createElement('span');
          reading.className = 'table-row-reading';
          reading.textContent = data.q_read + data.a_read;

          row.appendChild(left);
          row.appendChild(right);
          row.appendChild(reading);
          section.appendChild(row);
        });

        container.appendChild(section);
      }
    }

    function playTableRow(data, dan, rowIndex) {
      stopTablePlayback();

      // ハイライト
      const row = document.getElementById(`table-row-${dan}-${rowIndex}`);
      if (row) {
        row.classList.add('playing');
        setTimeout(() => row.classList.remove('playing'), 2000);
      }

      speak(data.q_read + data.a_read);
    }

    function playDan(dan) {
      if (isPlayingTable) {
        stopTablePlayback();
        return;
      }

      isPlayingTable = true;
      tablePlaybackIndex = 0;
      tablePlaybackData = kukuData.filter(d => d.a === dan).map((data, index) => ({
        data: data,
        dan: dan,
        index: index
      }));

      playNextTableRow();
    }

    function playNextTableRow() {
      if (!isPlayingTable || tablePlaybackIndex >= tablePlaybackData.length) {
        stopTablePlayback();
        return;
      }

      const item = tablePlaybackData[tablePlaybackIndex];
      const row = document.getElementById(`table-row-${item.dan}-${item.index}`);

      // 全ての行のハイライトを削除
      document.querySelectorAll('.table-row').forEach(r => r.classList.remove('playing'));

      // 現在の行をハイライト
      if (row) {
        row.classList.add('playing');
      }

      speak(item.data.q_read + item.data.a_read);

      tablePlaybackIndex++;
      setTimeout(() => playNextTableRow(), 2000);
    }

    function stopTablePlayback() {
      isPlayingTable = false;
      tablePlaybackIndex = 0;
      tablePlaybackData = [];
      document.querySelectorAll('.table-row').forEach(r => r.classList.remove('playing'));
    }

    // 初期化
    initVoice();

    // --- Audio System ---
    let audioCtx = null;
    let isMuted = true;
    let bgmTimer = null;
    let audioInitialized = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (!audioInitialized) {
        isMuted = false;
        updateMuteIcon();
        audioInitialized = true;
      }
      startBgm();
    }

    function toggleMute() {
      if (!audioCtx) {
        initAudio();
        return;
      }
      isMuted = !isMuted;
      updateMuteIcon();
      if (isMuted) {
        stopBgm();
        synth.cancel();
      } else {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startBgm();
      }
    }

    function updateMuteIcon() {
      const btn = document.getElementById('mute-btn');
      btn.textContent = isMuted ? '🔇' : '🔊';
    }

    const BGM_SONGS = [
      {
        name: "ゆったり",
        tempo: 0.4,
        waveType: "sine",
        gain: 0.03,
        melody: [523.25, 587.33, 659.25, 783.99, 659.25, 783.99, 1046.50, 783.99,
                 523.25, 659.25, 587.33, 523.25, 392.00, 523.25, 587.33, 659.25]
      },
      {
        name: "わくわく",
        tempo: 0.2,
        waveType: "square",
        gain: 0.015,
        melody: [523.25, 523.25, 783.99, 783.99, 659.25, 783.99, 523.25, 392.00,
                 440.00, 523.25, 659.25, 523.25, 783.99, 659.25, 523.25, 440.00,
                 523.25, 659.25, 783.99, 1046.50, 783.99, 659.25, 523.25, 659.25,
                 783.99, 523.25, 440.00, 392.00, 440.00, 523.25, 659.25, 523.25]
      },
      {
        name: "たのしい",
        tempo: 0.18,
        waveType: "triangle",
        gain: 0.025,
        melody: [659.25, 783.99, 659.25, 523.25, 659.25, 783.99, 1046.50, 783.99,
                 659.25, 523.25, 392.00, 523.25, 659.25, 523.25, 783.99, 659.25,
                 1046.50, 783.99, 659.25, 783.99, 523.25, 659.25, 392.00, 523.25]
      },
      {
        name: "キラキラ",
        tempo: 0.22,
        waveType: "sine",
        gain: 0.03,
        melody: [1046.50, 1046.50, 783.99, 783.99, 880.00, 880.00, 783.99, 0,
                 698.46, 698.46, 659.25, 659.25, 587.33, 587.33, 523.25, 0,
                 783.99, 783.99, 698.46, 698.46, 659.25, 659.25, 587.33, 0,
                 783.99, 783.99, 698.46, 698.46, 659.25, 659.25, 587.33, 0,
                 1046.50, 1046.50, 783.99, 783.99, 880.00, 880.00, 783.99, 0,
                 698.46, 698.46, 659.25, 659.25, 587.33, 587.33, 523.25, 0]
      }
    ];
    let currentSongIndex = 0;
    let noteIndex = 0;

    function selectSong(index) {
      currentSongIndex = index;
      localStorage.setItem('kuku_bgm', index);
      noteIndex = 0;
      document.querySelectorAll('.bgm-option').forEach((el, i) => {
        el.classList.toggle('bgm-active', i === index);
      });
      if (!isMuted && bgmTimer) {
        stopBgm();
        startBgm();
      }
      initAudio();
      playSe('btn');
    }

    function startBgm() {
      if (isMuted || bgmTimer) return;
      scheduleNextNote();
    }

    function stopBgm() {
      clearTimeout(bgmTimer);
      bgmTimer = null;
    }

    function scheduleNextNote() {
      if (isMuted) { bgmTimer = null; return; }
      if (!audioCtx) return;

      const song = BGM_SONGS[currentSongIndex];
      const freq = song.melody[noteIndex % song.melody.length];

      if (freq > 0) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = song.waveType;
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(song.gain, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + song.tempo);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + song.tempo);
      }

      noteIndex++;
      bgmTimer = setTimeout(scheduleNextNote, song.tempo * 1000);
    }

    function playSe(type) {
      if (isMuted || !audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'btn') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.linearRampToValueAtTime(1046.50, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else if (type === 'incorrect') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else if (type === 'cancel') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'result') {
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.type = 'triangle';
          o.frequency.value = f;
          g.gain.setValueAtTime(0.05, now + i * 0.1);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
          o.start(now + i * 0.1);
          o.stop(now + i * 0.1 + 0.4);
        });
      }
    }

    // 初期化: localStorage からBGMと問題数を復元
    (function init() {
      const savedBgm = parseInt(localStorage.getItem('kuku_bgm') || '0');
      document.getElementById('app').dataset.screen = 'title';
      if (savedBgm !== 0) {
        currentSongIndex = savedBgm;
        document.querySelectorAll('.bgm-option').forEach((el, i) => {
          el.classList.toggle('bgm-active', i === savedBgm);
        });
      }
      document.getElementById('question-count-display').textContent = totalQuestions;
    })();

  </script>
</body>
</html>
