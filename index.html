<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="portrait">
  <title>九九がくしゅうアプリ</title>
  
  <!--
  ゲーム要件:
  ・九九の問題がランダムで出る（例: 2×2=?）
  ・問題表示と同時に読み上げ音声が流れる（例: 「ににんが」）
  ・1-9（および0）のボタンで答えを入力して答える
  ・合ってたら⚪︎で1点、間違ってたら✖️で0点
  ・合ってても間違えても正解の読み上げ音声が流れる（例: 「し」）
  ・モード: 1-9の段の個別モード、1-3、3-5、6-9、1-4、5-9、1-9の段モード
  ・タイトル画面、スコア画面がある
  ・デザイン: KAWAIIカルチャー、ゆめかわいい、パステルカラー、丸ゴシック
  ・5問目と10問目は逆問題: 答えが表示され、式（かけ算の数）を穴埋めで入力する
  ・全問題で九九の読みがなを表示し、回答後に完全な読みが表示される
    - 通常問題: 式と共に「ににんが」を表示、回答後に「し」を公開
    - 逆問題: 答えと共に「し」を表示、回答後に「ににんが」を公開
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #FFF0F5; /* Lavender Blush */
      --main-pink: #FF69B4; /* Hot Pink */
      --pastel-purple: #9370DB; /* Medium Purple */
      --mint: #4ECDC4;
      --gold: #FFD700;
      --sky: #65D6FF;
      --coral: #FF7A90;
      --lime: #A8F04F;
      --deep: #3B247C;
      --text-color: #555;
      --white: #ffffff;
      --shadow: 0 4px 0 rgba(0,0,0,0.1);
      --btn-shadow: 0 6px 0 rgba(0,0,0,0.15);
      --btn-active-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.9) 0 8%, transparent 26%),
        linear-gradient(135deg, #ffeaf6 0%, #d9f8ff 42%, #fff4a8 100%);
      background-size: 220% 220%;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      color: var(--text-color);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      animation: dreamySky 6s ease-in-out infinite;
    }

    #app {
      width: 100%;
      height: 100%;
      max-width: 500px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.1)),
        radial-gradient(circle at 10% 20%, rgba(255, 105, 180, 0.22) 0%, transparent 24%),
        radial-gradient(circle at 90% 80%, rgba(78, 205, 196, 0.22) 0%, transparent 24%);
    }

    #app::before {
      content: "";
      position: absolute;
      inset: -45%;
      z-index: 0;
      pointer-events: none;
      background:
        conic-gradient(from 40deg, rgba(255, 47, 168, 0.32), rgba(34, 217, 255, 0.32), rgba(168, 240, 79, 0.28), rgba(255, 215, 0, 0.34), rgba(255, 47, 168, 0.32));
      filter: blur(24px) saturate(1.4);
      opacity: 1;
      animation: colorSpin 8s linear infinite;
      mix-blend-mode: screen;
    }

    #app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(45deg, transparent 0 14px, rgba(255,255,255,0.04) 14px 16px),
        radial-gradient(ellipse at center, transparent 40%, rgba(59, 36, 124, 0.18) 100%);
      animation: vignettePulse 3.6s ease-in-out infinite;
    }

    @keyframes vignettePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* スクリーン全体フラッシュ */
    .screen-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 80;
      opacity: 0;
      mix-blend-mode: screen;
    }

    .screen-flash.active {
      animation: screenFlash 0.6s ease-out forwards;
    }

    .screen-flash.correct {
      background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255, 215, 0, 0.7) 30%, rgba(78, 205, 196, 0.4) 60%, transparent 80%);
    }

    .screen-flash.incorrect {
      background: radial-gradient(circle at center, rgba(255, 100, 130, 0.85) 0%, rgba(255, 47, 168, 0.55) 35%, transparent 75%);
    }

    .screen-flash.fever {
      background:
        conic-gradient(from 0deg, #ff2fa8, #ffd700, #4ecdc4, #65d6ff, #a8f04f, #ff2fa8);
      animation: feverFlash 1.1s ease-out forwards;
    }

    @keyframes screenFlash {
      0% { opacity: 0; transform: scale(0.7); }
      30% { opacity: 0.95; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(1.4); }
    }

    @keyframes feverFlash {
      0% { opacity: 0; transform: rotate(0deg) scale(0.5); filter: blur(18px); }
      40% { opacity: 0.85; transform: rotate(120deg) scale(1.2); filter: blur(8px); }
      100% { opacity: 0; transform: rotate(360deg) scale(1.8); filter: blur(28px); }
    }

    /* 全画面シェイク */
    #app.shake-correct {
      animation: appShakeCorrect 0.55s cubic-bezier(0.2, 1.4, 0.3, 1);
    }

    #app.shake-incorrect {
      animation: appShakeIncorrect 0.5s ease-in-out;
    }

    #app.zoom-pop {
      animation: appZoomPop 0.6s cubic-bezier(0.2, 1.5, 0.3, 1);
    }

    @keyframes appShakeCorrect {
      0% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.04) rotate(0.6deg); }
      60% { transform: scale(0.99) rotate(-0.4deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes appShakeIncorrect {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      15% { transform: translate(-12px, 4px) rotate(-1deg); }
      30% { transform: translate(11px, -3px) rotate(1.2deg); }
      45% { transform: translate(-9px, 5px) rotate(-0.8deg); }
      60% { transform: translate(8px, -4px) rotate(0.6deg); }
      80% { transform: translate(-4px, 2px) rotate(-0.3deg); }
    }

    @keyframes appZoomPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* レーザービーム放射 */
    .laser-burst {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--laser-color), transparent);
      transform-origin: top center;
      transform: translate(-50%, 0) rotate(var(--angle));
      filter: drop-shadow(0 0 10px var(--laser-color));
      pointer-events: none;
      animation: laserShoot 0.7s ease-out forwards;
    }

    @keyframes laserShoot {
      0% { height: 0; opacity: 1; }
      40% { height: 120%; opacity: 1; }
      100% { height: 130%; opacity: 0; }
    }

    /* 紙吹雪 */
    .confetti {
      position: absolute;
      left: var(--cx);
      top: -20px;
      width: var(--csize);
      height: calc(var(--csize) * 1.6);
      background: var(--ccolor);
      border-radius: 2px;
      transform: rotate(var(--crot));
      pointer-events: none;
      animation: confettiFall var(--clife) linear forwards;
    }

    @keyframes confettiFall {
      0% { transform: translate(0, 0) rotate(var(--crot)); opacity: 1; }
      100% { transform: translate(var(--cdx), 110vh) rotate(calc(var(--crot) + 720deg)); opacity: 0.85; }
    }

    /* 流れ星 */
    .shooting-star {
      position: absolute;
      left: var(--ssx);
      top: var(--ssy);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 12px white, 0 0 24px var(--ssc);
      pointer-events: none;
      animation: shootStar 1.4s linear forwards;
    }

    .shooting-star::after {
      content: "";
      position: absolute;
      right: 4px;
      top: 50%;
      width: 80px;
      height: 2px;
      background: linear-gradient(to left, var(--ssc), transparent);
      transform: translateY(-50%);
    }

    @keyframes shootStar {
      0% { transform: translate(0, 0); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate(var(--ssdx), var(--ssdy)); opacity: 0; }
    }

    .scene-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      perspective: 720px;
      transform-style: preserve-3d;
    }

    .sky-ribbon {
      position: absolute;
      left: 50%;
      top: 5%;
      width: 88%;
      height: 34%;
      border: 14px solid rgba(255, 255, 255, 0.45);
      border-left-color: rgba(255, 105, 180, 0.28);
      border-right-color: rgba(78, 205, 196, 0.32);
      border-radius: 50%;
      transform: translateX(-50%) rotateX(58deg) rotateZ(-12deg);
      filter: drop-shadow(0 0 22px rgba(255, 255, 255, 0.65));
      animation: ribbonRoll 7s ease-in-out infinite;
    }

    .warp-grid {
      position: absolute;
      left: -18%;
      right: -18%;
      bottom: -17%;
      height: 52%;
      background-image:
        linear-gradient(rgba(255, 47, 168, 0.45) 2px, transparent 2px),
        linear-gradient(90deg, rgba(34, 217, 255, 0.45) 2px, transparent 2px);
      background-size: 34px 34px;
      transform: rotateX(64deg) translateZ(-60px);
      transform-origin: center bottom;
      opacity: 0.7;
      filter: drop-shadow(0 0 12px rgba(255, 47, 168, 0.5));
      animation: gridRun 0.8s linear infinite;
    }

    .warp-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(255, 215, 0, 0.35), transparent 60%);
      mix-blend-mode: screen;
      animation: gridGlow 2.5s ease-in-out infinite;
    }

    @keyframes gridGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .floating-kuku span {
      position: absolute;
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.12)),
        conic-gradient(from 90deg, #ff2fa8, #22d9ff, #fff047, #6cff57, #ff2fa8);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(59, 36, 124, 0.38), 0 0 14px rgba(255,255,255,0.9);
      box-shadow: 0 16px 32px rgba(59, 36, 124, 0.18), 0 0 26px rgba(255,105,180,0.36), inset 0 0 0 2px rgba(255,255,255,0.62);
      transform-style: preserve-3d;
      animation: floatCube 5.5s ease-in-out infinite;
    }

    .floating-kuku span:nth-child(2n) {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.1)),
        conic-gradient(from 20deg, #00d7ff, #8b5cff, #ffdf2e, #ff4e8a, #00d7ff);
    }

    .floating-kuku span:nth-child(3n) {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.68), rgba(255,255,255,0.08)),
        conic-gradient(from 160deg, #90ff00, #00e2c8, #ff37d2, #ffe600, #90ff00);
    }

    .floating-kuku span:nth-child(1) { left: 5%; top: 12%; animation-delay: -0.2s; }
    .floating-kuku span:nth-child(2) { right: 4%; top: 16%; animation-delay: -1.3s; }
    .floating-kuku span:nth-child(3) { left: 9%; bottom: 18%; animation-delay: -2.2s; }
    .floating-kuku span:nth-child(4) { right: 9%; bottom: 20%; animation-delay: -3.1s; }
    .floating-kuku span:nth-child(5) { left: 43%; top: 7%; animation-delay: -4s; }

    #burst-layer {
      position: absolute;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      left: var(--left);
      top: var(--top);
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      color: var(--spark-color);
      font-size: var(--spark-size);
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(255,255,255,0.9), 0 0 14px currentColor;
      transform: translate3d(-50%, -50%, 0) scale(0.5) rotate(0deg);
      animation: sparkFly var(--spark-life) cubic-bezier(0.12, 0.75, 0.2, 1) forwards;
    }

    #app.hit-correct .question-area {
      animation: correctPunch 0.85s cubic-bezier(0.2, 1.6, 0.3, 1);
    }

    #app.hit-correct .stage-core {
      animation: corePunchUp 0.7s cubic-bezier(0.2, 1.6, 0.3, 1);
    }

    #app.hit-incorrect .question-area {
      animation: wrongShake 0.55s ease-in-out;
    }

    #app.hit-incorrect .stage-core {
      filter: hue-rotate(-50deg) saturate(1.5);
      animation: coreShake 0.55s ease-in-out;
    }

    @keyframes corePunchUp {
      0% { transform: rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px) scale(1); }
      40% { transform: rotateX(-20deg) rotateY(30deg) translateY(-30px) translateZ(120px) scale(1.35); }
      100% { transform: rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px) scale(1); }
    }

    @keyframes coreShake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-12px) rotate(-6deg) scale(0.95); }
      50% { transform: translateX(10px) rotate(6deg) scale(1.05); }
      75% { transform: translateX(-6px) rotate(-3deg); }
    }

    #app.combo-fever .sky-ribbon {
      border-top-color: rgba(255, 215, 0, 0.95);
      border-left-color: rgba(255, 47, 168, 0.7);
      border-right-color: rgba(34, 217, 255, 0.85);
      filter: drop-shadow(0 0 38px rgba(255, 215, 0, 0.85));
      animation-duration: 2.2s;
    }

    #app.combo-fever .warp-grid {
      opacity: 1;
      animation-duration: 0.4s;
      filter: drop-shadow(0 0 22px rgba(255, 215, 0, 0.7));
    }

    #app.combo-fever::before {
      animation-duration: 3.5s;
      filter: blur(18px) saturate(2);
    }

    #app.combo-fever .floating-kuku span {
      filter: saturate(2) drop-shadow(0 0 24px rgba(255, 215, 0, 0.8)) brightness(1.2);
    }

    #app[data-screen="game"] .floating-kuku span {
      width: clamp(58px, 16vw, 74px);
      height: clamp(58px, 16vw, 74px);
      border-radius: 22px;
      font-size: clamp(1rem, 4vw, 1.32rem);
      opacity: 0.92;
      animation: neonSideFloat 3.4s ease-in-out infinite;
      filter: saturate(1.45) drop-shadow(0 0 18px rgba(255, 215, 0, 0.42));
    }

    #app[data-screen="game"] .floating-kuku span:nth-child(1) { left: -28px; top: 7%; }
    #app[data-screen="game"] .floating-kuku span:nth-child(2) { right: -30px; top: 9%; }
    #app[data-screen="game"] .floating-kuku span:nth-child(3) { left: -34px; bottom: 5%; }
    #app[data-screen="game"] .floating-kuku span:nth-child(4) { right: -36px; bottom: 5%; }
    #app[data-screen="game"] .floating-kuku span:nth-child(5) {
      left: calc(50% - 43px);
      top: -50px;
      width: 86px;
      height: 86px;
      opacity: 0.62;
    }

    @keyframes dreamySky {
      0%, 100% { background-position: 0% 45%; }
      50% { background-position: 100% 55%; }
    }

    @keyframes colorSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes ribbonRoll {
      0%, 100% { transform: translateX(-50%) rotateX(58deg) rotateZ(-12deg) translateY(0); }
      50% { transform: translateX(-50%) rotateX(64deg) rotateZ(10deg) translateY(12px); }
    }

    @keyframes gridRun {
      to { background-position: 0 34px, 34px 0; }
    }

    @keyframes floatCube {
      0%, 100% { transform: translate3d(0, 0, 16px) rotateX(12deg) rotateY(-18deg); }
      50% { transform: translate3d(0, -18px, 70px) rotateX(-18deg) rotateY(24deg) rotateZ(8deg); }
    }

    @keyframes neonSideFloat {
      0%, 100% { transform: translate3d(0, 0, 18px) rotateZ(-8deg) scale(1); }
      50% { transform: translate3d(0, -14px, 62px) rotateZ(9deg) scale(1.08); }
    }

    @keyframes sparkFly {
      0% { opacity: 1; transform: translate3d(-50%, -50%, 0) scale(0.3) rotate(0deg); filter: brightness(2); }
      30% { opacity: 1; transform: translate3d(calc(var(--x) * 0.45 - 50%), calc(var(--y) * 0.4 - 50%), 0) scale(1.6) rotate(calc(var(--spin) * 0.4)); }
      72% { opacity: 1; transform: translate3d(calc(var(--x) * 0.85 - 50%), calc(var(--y) * 0.85 - 50%), 0) scale(1.4) rotate(calc(var(--spin) * 0.8)); }
      100% { opacity: 0; transform: translate3d(calc(var(--x) - 50%), calc(var(--y) + 60px - 50%), 0) scale(0.6) rotate(var(--spin)); filter: brightness(0.6); }
    }

    @keyframes correctPunch {
      0% { transform: rotateX(0deg) rotateY(0deg) scale(1); box-shadow: 0 16px 34px rgba(59,36,124,0.12), inset 0 0 0 2px rgba(255,255,255,0.85); }
      30% { transform: rotateX(15deg) rotateY(-8deg) scale(1.12); box-shadow: 0 22px 60px rgba(255, 215, 0, 0.55), 0 0 80px rgba(255, 105, 180, 0.4), inset 0 0 0 3px rgba(255, 215, 0, 0.95); }
      55% { transform: rotateX(-10deg) rotateY(10deg) scale(0.98); box-shadow: 0 22px 60px rgba(78, 205, 196, 0.5), 0 0 60px rgba(101, 214, 255, 0.5), inset 0 0 0 3px rgba(78, 205, 196, 0.85); }
      78% { transform: rotateX(6deg) rotateY(-4deg) scale(1.04); }
      100% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0) rotate(0deg); border-color: transparent; }
      15% { transform: translateX(-16px) rotateZ(-2.5deg); box-shadow: 0 16px 34px rgba(255, 47, 168, 0.4), inset 0 0 0 3px rgba(255, 47, 168, 0.6); }
      35% { transform: translateX(14px) rotateZ(2.5deg); box-shadow: 0 16px 34px rgba(255, 47, 168, 0.5), inset 0 0 0 3px rgba(255, 47, 168, 0.7); }
      55% { transform: translateX(-10px) rotateZ(-1.8deg); box-shadow: 0 16px 34px rgba(255, 47, 168, 0.4), inset 0 0 0 3px rgba(255, 47, 168, 0.6); }
      75% { transform: translateX(7px) rotateZ(1deg); }
    }

    /* 共通スタイル */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 3;
    }

    h1 {
      font-size: 1.4rem;
      color: var(--main-pink);
      text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1);
      margin: 6px 0;
      text-align: center;
    }

    h2 {
      color: var(--pastel-purple);
      margin: 3px 0;
      font-size: 0.85rem;
    }

    .btn {
      background-color: var(--white);
      border: 2px solid var(--main-pink);
      border-radius: 50px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      color: var(--main-pink);
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      margin: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 65px;
      transform: translateZ(0);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: var(--btn-active-shadow);
    }

    .btn-primary {
      background-color: var(--main-pink);
      color: var(--white);
      border-color: var(--white);
    }

    .btn-secondary {
      background-color: var(--mint);
      color: var(--white);
      border-color: var(--white);
    }

    /* タイトル画面 */
    #title-screen {
      justify-content: flex-start;
    }

    .mode-section {
      width: 100%;
      background: rgba(255,255,255,0.72);
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 8px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(59, 36, 124, 0.08), inset 0 0 0 1px rgba(255,255,255,0.75);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .mode-grid .btn {
      min-width: auto;
      width: 100%;
      padding: 5px 0;
      font-size: 0.7rem;
      border-radius: 10px;
    }

    .range-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }

    /* ゲーム画面 */
    #game-screen {
      justify-content: flex-start;
      gap: 6px;
    }

    .status-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--pastel-purple);
      padding: 0 52px 0 8px;
      position: relative;
    }

    .status-bar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .status-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      gap: 2px;
      min-width: 72px;
    }

    .combo-display {
      color: var(--coral);
      font-size: 0.66rem;
      text-shadow: 0 1px 0 #fff;
    }

    .power-stage {
      width: 100%;
      min-height: clamp(88px, 18vh, 130px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      perspective: 780px;
      transform-style: preserve-3d;
      margin: 0 0 -4px;
    }

    .stage-core {
      position: relative;
      width: clamp(82px, 24vw, 112px);
      height: clamp(82px, 24vw, 112px);
      display: grid;
      place-items: center;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.9), rgba(255,255,255,0.18)),
        conic-gradient(from 120deg, var(--main-pink), var(--sky), var(--lime), var(--gold), var(--main-pink));
      color: #fff;
      font-size: clamp(1.6rem, 8vw, 2.7rem);
      font-weight: 900;
      text-shadow: 0 3px 0 rgba(59, 36, 124, 0.22), 0 0 18px rgba(255,255,255,0.9), 0 0 30px var(--gold);
      box-shadow: 0 18px 42px rgba(59, 36, 124, 0.22), 0 0 35px rgba(255, 105, 180, 0.45), inset 0 0 0 3px rgba(255,255,255,0.62);
      transform-style: preserve-3d;
      animation: coreFloat 2.4s ease-in-out infinite, coreGlow 2.8s ease-in-out infinite;
    }

    @keyframes coreGlow {
      0%, 100% { box-shadow: 0 18px 42px rgba(59, 36, 124, 0.22), 0 0 30px rgba(255, 105, 180, 0.45), inset 0 0 0 3px rgba(255,255,255,0.62); }
      50% { box-shadow: 0 18px 50px rgba(59, 36, 124, 0.3), 0 0 60px rgba(255, 215, 0, 0.7), 0 0 90px rgba(78, 205, 196, 0.4), inset 0 0 0 3px rgba(255,255,255,0.85); }
    }

    .stage-core::before,
    .stage-core::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.6);
      transform: translateZ(-18px) rotate(10deg);
    }

    .stage-core::after {
      inset: -10px;
      border-color: rgba(255, 215, 0, 0.48);
      transform: translateZ(-34px) rotate(-14deg);
    }

    .stage-ring {
      position: absolute;
      width: min(78vw, 360px);
      height: clamp(48px, 12vh, 72px);
      border: 8px solid rgba(255,255,255,0.58);
      border-left-color: rgba(255, 105, 180, 0.6);
      border-right-color: rgba(78, 205, 196, 0.65);
      border-radius: 50%;
      transform: rotateX(70deg) rotateZ(0deg);
      animation: stageRing 2.2s linear infinite;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.7));
    }

    .stage-ring.back {
      width: min(62vw, 290px);
      height: clamp(42px, 10vh, 64px);
      border-width: 5px;
      opacity: 0.6;
      animation-direction: reverse;
      animation-duration: 3.4s;
    }

    .stage-comet {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 10px rgba(255,215,0,0.32), 0 0 40px rgba(255,215,0,1), 0 0 80px rgba(255, 105, 180, 0.6);
      transform-origin: 108px 50%;
      animation: cometRun 1.1s linear infinite;
    }

    .stage-comet::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 50%;
      width: 60px;
      height: 4px;
      background: linear-gradient(to left, rgba(255, 215, 0, 0.85), transparent);
      transform: translateY(-50%);
      filter: blur(2px);
    }

    .stage-mini {
      position: absolute;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: rgba(255,255,255,0.76);
      color: var(--pastel-purple);
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(59,36,124,0.12);
      animation: miniHop 1.7s ease-in-out infinite;
    }

    .stage-mini.one { left: 18%; top: 20%; animation-delay: -0.4s; }
    .stage-mini.two { right: 18%; bottom: 18%; animation-delay: -1s; }

    #app.combo-fever .stage-core {
      animation-duration: 1.2s;
      box-shadow: 0 18px 52px rgba(255, 105, 180, 0.36), 0 0 36px rgba(255, 215, 0, 0.42), inset 0 0 0 3px rgba(255,255,255,0.68);
    }

    @keyframes coreFloat {
      0%, 100% { transform: rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px); }
      50% { transform: rotateX(-8deg) rotateY(18deg) translateY(-10px) translateZ(44px); }
    }

    @keyframes stageRing {
      to { transform: rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes cometRun {
      0% { transform: rotate(0deg) translateX(108px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(108px) rotate(-360deg); }
    }

    @keyframes miniHop {
      0%, 100% { transform: translateY(0) rotateZ(-6deg); }
      50% { transform: translateY(-12px) rotateZ(8deg); }
    }

    .question-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin: 6px 0;
      min-height: 7rem;
      position: relative;
      border-radius: 18px;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.78)),
        radial-gradient(circle at 18% 22%, rgba(255, 105, 180, 0.18), transparent 38%),
        radial-gradient(circle at 82% 82%, rgba(78, 205, 196, 0.16), transparent 40%);
      box-shadow: 0 16px 34px rgba(59,36,124,0.12), inset 0 0 0 2px rgba(255,255,255,0.85);
      transform-style: preserve-3d;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .question-area::before {
      content: "";
      position: absolute;
      inset: -7px;
      z-index: -1;
      border-radius: 24px;
      background:
        linear-gradient(90deg, rgba(255,105,180,0.82), rgba(255,215,0,0.72), rgba(78,205,196,0.82)) top / 100% 5px no-repeat,
        linear-gradient(90deg, rgba(101,214,255,0.82), rgba(168,240,79,0.68), rgba(255,105,180,0.82)) bottom / 100% 5px no-repeat,
        linear-gradient(180deg, rgba(255,105,180,0.64), rgba(101,214,255,0.55)) left / 5px 100% no-repeat,
        linear-gradient(180deg, rgba(255,215,0,0.68), rgba(168,240,79,0.58)) right / 5px 100% no-repeat;
      opacity: 0.74;
      filter: drop-shadow(0 0 12px rgba(255, 105, 180, 0.3));
      animation: questionGlow 2.8s ease-in-out infinite;
    }

    .question-area::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: -13px;
      height: 8px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, #ff2fa8 0 10px, #ffd700 10px 20px, #4ecdc4 20px 30px, #65d6ff 30px 40px);
      box-shadow: 0 0 16px rgba(255, 215, 0, 0.34);
      opacity: 0.72;
      animation: questionMeter 0.7s steps(6) infinite;
    }

    @keyframes questionGlow {
      0%, 100% { opacity: 0.58; filter: drop-shadow(0 0 8px rgba(101, 214, 255, 0.22)); }
      50% { opacity: 0.92; filter: drop-shadow(0 0 16px rgba(255, 105, 180, 0.38)); }
    }

    @keyframes questionMeter {
      to { background-position: 40px 0; }
    }

    .question-text {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--main-pink);
      text-shadow: 2px 2px 0 #fff, 0 10px 22px rgba(255, 105, 180, 0.22);
      margin-bottom: 6px;
      letter-spacing: 1px;
      min-height: 2.5rem;
    }

    .answer-display {
      font-size: 1.6rem;
      height: 2rem;
      line-height: 2rem;
      color: var(--pastel-purple);
      border-bottom: 2px dashed var(--mint);
      padding: 0 12px;
      min-width: 80px;
      text-align: center;
      background: rgba(255,255,255,0.86);
      border-radius: 6px;
      box-shadow: inset 0 -4px 0 rgba(78, 205, 196, 0.12);
    }

    /* 九九よみがな表示 */
    .kuku-reading {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--pastel-purple);
      height: 1.6rem;
      line-height: 1.6rem;
      text-align: center;
      margin: 4px 0;
      letter-spacing: 2px;
      overflow: visible;
    }

    .kuku-blank {
      display: inline-block;
      min-width: 2em;
      border-bottom: 2px dashed var(--main-pink);
      margin: 0 2px;
      color: transparent;
    }

    .kuku-revealed {
      display: inline-block;
      color: var(--main-pink);
      font-weight: 900;
      animation: kukuReveal 0.3s ease-out;
    }

    @keyframes kukuReveal {
      from { opacity: 0; transform: scale(1.3); }
      to { opacity: 1; transform: scale(1); }
    }

    /* 式入力モード（Q5, Q10用） */
    .equation-display {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 1.8rem;
      font-weight: 900;
    }

    .equation-slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.2rem;
      height: 2.2rem;
      border: 2px dashed var(--mint);
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
      font-size: 1.6rem;
      color: var(--main-pink);
      font-weight: 900;
      transition: border-color 0.2s, background 0.2s;
    }

    .equation-slot.active-slot {
      border-color: var(--main-pink);
      background: rgba(255, 105, 180, 0.1);
      animation: slotPulse 1s infinite;
    }

    .equation-slot.filled-slot {
      border-style: solid;
      background: rgba(78, 205, 196, 0.15);
    }

    @keyframes slotPulse {
      0%, 100% { border-color: var(--main-pink); }
      50% { border-color: var(--mint); }
    }

    .equation-operator {
      color: var(--text-color);
      font-size: 1.4rem;
    }

    .equation-answer-part {
      color: var(--main-pink);
      font-weight: 900;
      font-size: 1.8rem;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 240px;
    }

    .num-btn {
      position: relative;
      background:
        linear-gradient(145deg, rgba(255,255,255,1), rgba(236, 250, 255, 0.9));
      border: 2px solid var(--mint);
      color: var(--mint);
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--btn-shadow), 0 0 0 0 rgba(78, 205, 196, 0);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
      overflow: hidden;
    }

    .num-btn::before {
      content: "";
      position: absolute;
      inset: 50%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(78, 205, 196, 0.7), transparent 70%);
      opacity: 0;
      pointer-events: none;
    }

    .num-btn:hover {
      filter: saturate(1.3) brightness(1.05);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 16px rgba(78, 205, 196, 0.35), 0 0 18px rgba(78, 205, 196, 0.4);
    }

    .num-btn:active {
      transform: translateY(4px) scale(0.92);
      box-shadow: var(--btn-active-shadow), 0 0 24px rgba(78, 205, 196, 0.7);
      background-color: var(--mint);
      color: var(--white);
    }

    .num-btn:active::before {
      animation: btnRipple 0.5s ease-out;
    }

    @keyframes btnRipple {
      0% { inset: 50%; opacity: 1; }
      100% { inset: -20%; opacity: 0; }
    }

    .num-btn.btn-enter:active {
      box-shadow: var(--btn-active-shadow), 0 0 28px rgba(255, 105, 180, 0.85);
    }

    .action-btn {
      border-radius: 12px;
      aspect-ratio: auto;
      height: 100%;
      font-size: 0.75rem;
    }

    .btn-clear {
      border-color: #ffb7b2;
      color: #ffb7b2;
    }
    .btn-enter {
      background: var(--main-pink);
      color: white;
      border-color: white;
      grid-column: span 1;
    }

    /* フィードバックオーバーレイ */
    #feedback-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 70;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .feedback-icon {
      font-size: 12rem;
      font-weight: 900;
      text-shadow:
        0 0 30px rgba(255,255,255,1),
        0 0 60px currentColor,
        0 0 90px currentColor,
        0 18px 44px rgba(59,36,124,0.4);
      transform: scale(0) rotate(-180deg);
      transition: none;
      filter: drop-shadow(0 0 22px currentColor);
    }

    .feedback-icon.pop-correct {
      animation: feedbackPopCorrect 1.4s cubic-bezier(0.2, 1.6, 0.3, 1) forwards;
    }

    .feedback-icon.pop-incorrect {
      animation: feedbackPopIncorrect 1.4s cubic-bezier(0.2, 1.4, 0.3, 1) forwards;
    }

    @keyframes feedbackPopCorrect {
      0% { transform: scale(0) rotate(-360deg); opacity: 0; }
      35% { transform: scale(1.4) rotate(20deg); opacity: 1; }
      55% { transform: scale(1.1) rotate(-12deg); opacity: 1; }
      70% { transform: scale(1.25) rotate(8deg); opacity: 1; }
      85% { transform: scale(1.15) rotate(0deg); opacity: 0.9; }
      100% { transform: scale(2.5) rotate(0deg); opacity: 0; }
    }

    @keyframes feedbackPopIncorrect {
      0% { transform: scale(0) rotate(0deg); opacity: 0; }
      20% { transform: scale(1.5) rotate(-15deg); opacity: 1; }
      35% { transform: scale(1.3) rotate(15deg); opacity: 1; }
      50% { transform: scale(1.4) rotate(-10deg); opacity: 1; }
      65% { transform: scale(1.2) rotate(8deg); opacity: 1; }
      80% { transform: scale(1.3) rotate(0deg); opacity: 0.85; }
      100% { transform: scale(0.5) rotate(0deg); opacity: 0; }
    }

    /* フィードバックリング */
    .feedback-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 8px solid currentColor;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      opacity: 0;
    }

    .feedback-ring.active {
      animation: ringExpand 1s ease-out forwards;
    }

    @keyframes ringExpand {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; border-width: 16px; }
      100% { transform: translate(-50%, -50%) scale(8); opacity: 0; border-width: 1px; }
    }

    .correct {
      color: var(--mint);
    }
    .incorrect {
      color: var(--main-pink);
    }

    /* リザルト画面 */
    #result-screen {
      justify-content: center;
    }

    .score-board {
      background: rgba(255,255,255,0.88);
      padding: 22px 30px;
      border-radius: 22px;
      border: 4px solid var(--gold);
      text-align: center;
      margin-bottom: 15px;
      box-shadow:
        0 10px 30px rgba(255, 215, 0, 0.45),
        0 0 60px rgba(255, 105, 180, 0.35),
        inset 0 0 0 2px rgba(255,255,255,0.95);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      animation: scoreBoardFloat 3s ease-in-out infinite, scoreBoardEnter 0.9s cubic-bezier(0.2, 1.5, 0.3, 1);
      position: relative;
      overflow: visible;
    }

    .score-board::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 28px;
      background: conic-gradient(from 0deg, #ff2fa8, #ffd700, #4ecdc4, #65d6ff, #a8f04f, #ff2fa8);
      filter: blur(12px);
      opacity: 0.55;
      z-index: -1;
      animation: scoreBoardSpin 4s linear infinite;
    }

    @keyframes scoreBoardEnter {
      0% { transform: scale(0.3) rotate(-12deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(4deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes scoreBoardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes scoreBoardSpin {
      to { transform: rotate(360deg); }
    }

    .score-text {
      font-size: 0.9rem;
      color: var(--text-color);
    }

    .final-score {
      font-size: 3.6rem;
      font-weight: 900;
      color: var(--main-pink);
      line-height: 1.2;
      text-shadow: 3px 3px 0 #fff, 0 0 30px rgba(255, 105, 180, 0.7), 0 0 60px var(--gold);
      animation: scorePulse 1.2s ease-in-out infinite;
    }

    @keyframes scorePulse {
      0%, 100% { transform: scale(1); filter: hue-rotate(0deg); }
      50% { transform: scale(1.08); filter: hue-rotate(15deg); }
    }

    .perfect-msg {
      color: var(--main-pink);
      font-weight: 900;
      font-size: 1.1rem;
      margin-top: 10px;
      text-shadow: 0 2px 0 #fff, 0 0 18px var(--gold);
      animation: perfectMsgWave 1.6s ease-in-out infinite;
    }

    @keyframes perfectMsgWave {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-3px) rotate(-1deg); }
      75% { transform: translateY(2px) rotate(1deg); }
    }

    .mute-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 100;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    #table-screen {
      justify-content: flex-start;
    }

    .table-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .table-content {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      max-width: 450px;
    }

    .table-dan-section {
      display: flex;
      flex-direction: column;
    }

    .table-dan-title {
      font-weight: 900;
      font-size: 0.75rem;
      color: var(--main-pink);
      margin-bottom: 2px;
      padding: 3px 6px;
      background: rgba(255, 105, 180, 0.1);
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .play-dan-btn {
      font-size: 0.65rem;
      padding: 2px 6px;
      min-width: auto;
    }

    .table-row {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 3px;
      padding: 3px 6px;
      margin: 1px 0;
      background: white;
      border-radius: 3px;
      font-size: 0.7rem;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .table-row:hover {
      background: var(--mint);
      color: white;
    }

    .table-row.playing {
      background: var(--main-pink);
      color: white;
      border-color: var(--gold);
    }

    .table-row-left {
      font-weight: bold;
      color: var(--pastel-purple);
      font-size: 0.68rem;
    }

    .table-row:hover .table-row-left,
    .table-row.playing .table-row-left {
      color: white;
    }

    .table-row-right {
      font-weight: 900;
      font-size: 0.78rem;
    }

    .table-row-reading {
      font-size: 0.6rem;
      color: var(--pastel-purple);
      opacity: 0.7;
      margin-left: auto;
    }

    .table-row:hover .table-row-reading,
    .table-row.playing .table-row-reading {
      color: white;
      opacity: 0.9;
    }

    /* BGMセレクター */
    .bgm-selector {
      padding: 6px 8px;
    }
    .bgm-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }
    .bgm-option {
      font-size: 0.6rem;
      padding: 4px 2px;
      min-width: auto;
      border-color: var(--pastel-purple);
      color: var(--pastel-purple);
      transition: all 0.2s;
    }
    .bgm-option.bgm-active {
      background-color: var(--pastel-purple);
      color: var(--white);
      border-color: var(--white);
    }

    /* くみあわせモード */
    .dan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 4px;
    }
    .dan-header h2 {
      margin: 0;
    }
    .combination-btn {
      font-size: 0.6rem;
      padding: 3px 8px;
      min-width: auto;
      border-color: var(--pastel-purple);
      color: var(--pastel-purple);
    }
    .dan-selected {
      background-color: var(--main-pink) !important;
      color: var(--white) !important;
      border-color: var(--gold) !important;
      box-shadow: 0 0 8px rgba(255, 105, 180, 0.4);

      { a: 8, b: 8, q_read: "はっぱ", a_read: "ろくじゅうし" },
      { a: 8, b: 9, q_read: "はっく", a_read: "しちじゅうに" },

    ];

    // ゲーム状態
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let streak = 0;
    let currentInput = "";
    let isProcessing = false;
    let currentQuestionType = "answer"; // "answer"（通常）or "equation"（逆問題: Q5, Q10）
    let equationInputB = "";
    let totalQuestions = parseInt(localStorage.getItem('kuku_question_count') || '10');

    // くみあわせモード
    let isCombinationMode = false;
    let selectedDans = new Set();

    // 自由選択モード
    let isFreeMode = false;
    let selectedFreeProblems = new Set(); // "a,b" 形式

    // 音声合成
    const synth = window.speechSynthesis;
    let voice = null;

    function initVoice() {
      const voices = synth.getVoices();
      // 日本語の音声を探す
      voice = voices.find(v => v.lang === 'ja-JP') || voices[0];
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = initVoice;
    }

    function speak(text) {
      if (synth.speaking) {
        synth.cancel();
      }
      const utterThis = new SpeechSynthesisUtterance(text);
      if (voice) utterThis.voice = voice;
      utterThis.lang = 'ja-JP';
      utterThis.rate = 1.0;
      utterThis.pitch = 1.2; // 子供向けに少し高め
      synth.speak(utterThis);
    }

    // 九九データから読み上げ用テキストを取得（q_speak/a_speak 優先、無ければ q_read/a_read）
    function getQSpeak(q) { return q.q_speak || q.q_read; }
    function getASpeak(q) { return q.a_speak || q.a_read; }
    function getFullSpeak(q) { return getQSpeak(q) + getASpeak(q); }

    // 画面切り替え
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => {
        el.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
      document.getElementById('app').dataset.screen = screenId.replace('-screen', '');
    }

    // ゲーム開始
    function startGame(mode) {
      // 音声初期化（ユーザー操作トリガー）
      initVoice();
      initAudio();
      speak(""); // ダミー再生でアンロック

      isFreeMode = false;
      score = 0;
      streak = 0;
      document.getElementById('app').classList.remove('combo-fever', 'hit-correct', 'hit-incorrect');
      currentQuestionIndex = 0;
      currentInput = "";
      isProcessing = false;
      currentQuestionType = "answer";
      equationInputB = "";
      document.getElementById('question-text').textContent = '';
      document.getElementById('kuku-reading').innerHTML = '';
      document.getElementById('answer-display').textContent = '\u00A0';
      document.getElementById('answer-display').style.display = '';
      
      // 問題生成
      let candidates = [];

      if (mode.includes(',')) {
        // くみあわせモード: カンマ区切りの段リスト
        const dans = mode.split(',').map(Number);
        candidates = kukuData.filter(d => dans.includes(d.a));
      } else if (mode.includes('-')) {
        const [start, end] = mode.split('-').map(Number);
        candidates = kukuData.filter(d => d.a >= start && d.a <= end);
      } else {
        const target = Number(mode);
        candidates = kukuData.filter(d => d.a === target);
      }

      // ランダムに10問選ぶ（重複ありにするか？なしにするか？ -> なし推奨だが候補が少ない場合はあり）
      // シャッフルして先頭10個を取る
      currentQuestions = shuffleArray([...candidates]).slice(0, totalQuestions);
      // もし候補が10個未満なら（例：1つの段は9個しかない）、補充する
      while (currentQuestions.length < totalQuestions) {
        const randomQ = candidates[Math.floor(Math.random() * candidates.length)];
        currentQuestions.push(randomQ);
      }

      updateStatusBar();
      showScreen('game-screen');
      
      // 少し待ってから最初の問題を表示
      setTimeout(showNextQuestion, 500);
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function showNextQuestion() {
      if (currentQuestionIndex >= totalQuestions) {
        endGame();
        return;
      }

      const q = currentQuestions[currentQuestionIndex];
      const questionTextEl = document.getElementById('question-text');
      const answerDisplayEl = document.getElementById('answer-display');
      const kukuReadingEl = document.getElementById('kuku-reading');

      // 5問ごとに逆問題（自由選択モードでは逆問題なし）
      const isEquationType = !isFreeMode && ((currentQuestionIndex + 1) % 5 === 0);
      currentQuestionType = isEquationType ? "equation" : "answer";
      updateStage(q);

      // 入力状態リセット
      currentInput = "";
      equationInputB = "";

      if (currentQuestionType === "equation") {
        // 逆問題: 左の数と答えを表示し、右の数だけ穴埋め
        const answer = q.a * q.b;
        questionTextEl.innerHTML =
          '<div class="equation-display">' +
          '<span class="equation-answer-part">' + q.a + '</span>' +
          '<span class="equation-operator">&times;</span>' +
          '<span id="slot-b" class="equation-slot active-slot">?</span>' +
          '<span class="equation-operator">=</span>' +
          '<span class="equation-answer-part">' + answer + '</span>' +
          '</div>';

        // よみがな: 式部分が空欄、答え部分を表示
        kukuReadingEl.innerHTML =
          '<span class="kuku-blank">' + q.q_read + '</span>' +
          '<span>' + q.a_read + '</span>';

        // 通常の入力欄を非表示
        answerDisplayEl.style.display = 'none';

        // 「あなうめもんだい」を読み上げ
        speak("あなうめもんだい");
      } else {
        // 通常問題: 式を表示し、答えを入力させる
        questionTextEl.textContent = q.a + ' \u00d7 ' + q.b + ' = ?';

        // よみがな: 式部分を表示、答え部分が空欄
        kukuReadingEl.innerHTML =
          '<span>' + q.q_read + '</span>' +
          '<span class="kuku-blank">' + q.a_read + '</span>';

        // 通常の入力欄を表示
        answerDisplayEl.style.display = '';

        // 式の読みを読み上げ
        speak(getQSpeak(q));
      }

      updateInputDisplay();
      updateStatusBar();
      isProcessing = false;
    }

    function updateStatusBar() {
      document.getElementById('question-counter').textContent = `もんだい ${currentQuestionIndex + 1}/${totalQuestions}`;
      document.getElementById('score-display').textContent = `スコア: ${score}`;
      document.getElementById('combo-display').textContent = `れんぞく: ${streak}`;
    }

    function prefersReducedMotion() {
      return typeof window.matchMedia === 'function' &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    }

    function isLegacyFx() {
      return document.body.classList.contains('legacy-fx');
    }

    function selectFx(mode) {
      const isLegacy = mode === 'legacy';
      document.body.classList.toggle('legacy-fx', isLegacy);
      localStorage.setItem('kuku_fx', mode);
      const newBtn = document.getElementById('fx-btn-new');
      const legacyBtn = document.getElementById('fx-btn-legacy');
      if (newBtn) newBtn.classList.toggle('fx-active', !isLegacy);
      if (legacyBtn) legacyBtn.classList.toggle('fx-active', isLegacy);
      playSe('btn');
    }

    function updateStage(q) {
      const stageNumber = document.getElementById('stage-number');
      const stageLeft = document.getElementById('stage-left');
      const stageRight = document.getElementById('stage-right');
      if (!stageNumber || !q) return;

      stageNumber.textContent = currentQuestionType === "equation" ? `${q.a}×?` : `${q.a}×${q.b}`;
      stageLeft.textContent = q.a;
      stageRight.textContent = currentQuestionType === "equation" ? "?" : q.b;
      if (!prefersReducedMotion()) {
        stageNumber.animate(
          [
            { transform: 'rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px) scale(0.88)' },
            { transform: 'rotateX(-8deg) rotateY(18deg) translateY(-10px) translateZ(44px) scale(1.08)' },
            { transform: 'rotateX(10deg) rotateY(-16deg) translateY(0) translateZ(20px) scale(1)' }
          ],
          { duration: 520, easing: 'cubic-bezier(0.2, 1.4, 0.3, 1)' }
        );
      }
    }

    function inputNum(num) {
      if (isProcessing) return;

      if (currentQuestionType === "equation") {
        // 逆問題: 右の数を1桁入力
        if (equationInputB !== "") return; // 入力済み
        equationInputB = String(num);
        updateEquationDisplay();
        playSe('btn');
      } else {
        // 通常問題
        if (currentInput === "0") currentInput = "";
        if (currentInput.length >= 2) return; // 2桁まで
        currentInput += num;
        updateInputDisplay();
        playSe('btn');
      }
    }

    function clearInput() {
      if (isProcessing) return;

      if (currentQuestionType === "equation") {
        equationInputB = "";
        updateEquationDisplay();
      } else {
        currentInput = "";
        updateInputDisplay();
      }
      playSe('cancel');
    }

    function updateInputDisplay() {
      const display = document.getElementById('answer-display');
      display.textContent = currentInput || '\u00A0'; // 空の場合は&nbsp;を表示
    }

    function updateEquationDisplay() {
      const slotB = document.getElementById('slot-b');
      if (!slotB) return;

      if (equationInputB !== "") {
        slotB.textContent = equationInputB;
        slotB.classList.remove('active-slot');
        slotB.classList.add('filled-slot');
      } else {
        slotB.textContent = '?';
        slotB.classList.remove('filled-slot');
        slotB.classList.add('active-slot');
      }
    }

    function submitAnswer() {
      if (isProcessing) return;

      const q = currentQuestions[currentQuestionIndex];
      const kukuReadingEl = document.getElementById('kuku-reading');

      if (currentQuestionType === "equation") {
        // 逆問題: 右の数の入力必須
        if (equationInputB === "") return;

        isProcessing = true;
        const userB = Number(equationInputB);

        // q.bと一致するか判定
        const isCorrect = (userB === q.b);

        if (isCorrect) {
          score++;
          streak++;
          showFeedback(true);
          playSe('correct');
        } else {
          streak = 0;
          showFeedback(false);
          playSe('incorrect');
        }
        updateStatusBar();

        // よみがな: 式部分(q_read)を公開して完成
        kukuReadingEl.innerHTML =
          '<span class="kuku-revealed">' + q.q_read + '</span>' +
          '<span>' + q.a_read + '</span>';

        // 正解の読み上げ
        setTimeout(() => {
          speak(getFullSpeak(q));
        }, 500);

        // 次の問題へ
        setTimeout(() => {
          currentQuestionIndex++;
          showNextQuestion();
        }, 2500);

      } else {
        // 通常問題
        if (currentInput === "") return;

        isProcessing = true;
        const userAnswer = Number(currentInput);
        const correctAnswer = q.a * q.b;
        const isCorrect = userAnswer === correctAnswer;

        if (isCorrect) {
          score++;
          streak++;
          showFeedback(true);
          playSe('correct');
        } else {
          streak = 0;
          showFeedback(false);
          playSe('incorrect');
        }
        updateStatusBar();

        // よみがな: 答え部分(a_read)を公開して完成
        kukuReadingEl.innerHTML =
          '<span>' + q.q_read + '</span>' +
          '<span class="kuku-revealed">' + q.a_read + '</span>';

        // 正解の読み上げ
        setTimeout(() => {
          speak(getFullSpeak(q));
        }, 500);

        // 次の問題へ
        setTimeout(() => {
          currentQuestionIndex++;
          showNextQuestion();
        }, 2500);
      }
    }

    function showFeedback(isCorrect) {
      const overlay = document.getElementById('feedback-overlay');
      const icon = document.getElementById('feedback-icon');
      const ring = document.getElementById('feedback-ring');
      const ring2 = document.getElementById('feedback-ring-2');
      const app = document.getElementById('app');
      const flash = document.getElementById('screen-flash');
      const isFever = streak >= 3;
      const legacy = isLegacyFx();

      overlay.style.opacity = 1;
      icon.textContent = isCorrect ? '⭕' : '❌';
      icon.className = 'feedback-icon ' + (isCorrect ? 'correct' : 'incorrect');

      // シンプル(legacy) モード
      if (legacy) {
        icon.style.transform = 'scale(0)';
        app.classList.toggle('combo-fever', isFever);
        app.classList.remove('hit-correct', 'hit-incorrect', 'shake-correct', 'shake-incorrect', 'zoom-pop');
        void app.offsetWidth;
        app.classList.add(isCorrect ? 'hit-correct' : 'hit-incorrect');
        launchBurst(isCorrect, isFever);
        requestAnimationFrame(() => { icon.style.transform = 'scale(1)'; });
        setTimeout(() => {
          icon.style.transform = 'scale(0)';
          overlay.style.opacity = 0;
          app.classList.remove('hit-correct', 'hit-incorrect');
        }, 1500);
        return;
      }

      // ド派手モード
      ring.className = 'feedback-ring ' + (isCorrect ? 'correct' : 'incorrect');
      ring2.className = 'feedback-ring ' + (isCorrect ? 'correct' : 'incorrect');
      ring.style.transitionDelay = '';
      ring2.style.transitionDelay = '';

      // 画面フラッシュ
      flash.className = 'screen-flash';
      void flash.offsetWidth;
      if (isFever && isCorrect) {
        flash.classList.add('active', 'fever');
      } else {
        flash.classList.add('active', isCorrect ? 'correct' : 'incorrect');
      }

      app.classList.toggle('combo-fever', isFever);
      app.classList.remove('hit-correct', 'hit-incorrect', 'shake-correct', 'shake-incorrect', 'zoom-pop');
      void app.offsetWidth;
      app.classList.add(isCorrect ? 'hit-correct' : 'hit-incorrect');
      app.classList.add(isCorrect ? 'shake-correct' : 'shake-incorrect');
      if (isCorrect) app.classList.add('zoom-pop');

      // アニメ再起動 トリック
      void icon.offsetWidth;
      icon.classList.add(isCorrect ? 'pop-correct' : 'pop-incorrect');
      void ring.offsetWidth;
      ring.classList.add('active');
      setTimeout(() => {
        void ring2.offsetWidth;
        ring2.classList.add('active');
      }, 120);

      launchBurst(isCorrect, isFever);
      if (isCorrect) {
        launchLasers(isFever);
        if (isFever) launchConfetti(20);
      }

      setTimeout(() => {
        overlay.style.opacity = 0;
        icon.classList.remove('pop-correct', 'pop-incorrect');
        ring.classList.remove('active');
        ring2.classList.remove('active');
        flash.classList.remove('active', 'correct', 'incorrect', 'fever');
        app.classList.remove('hit-correct', 'hit-incorrect', 'shake-correct', 'shake-incorrect', 'zoom-pop');
      }, 1500);
    }

    function launchLasers(isBig) {
      if (prefersReducedMotion() || isLegacyFx()) return;
      const layer = document.getElementById('burst-layer');
      if (!layer) return;
      const count = isBig ? 12 : 8;
      const colors = ['#FFD700', '#FF69B4', '#4ECDC4', '#65D6FF', '#A8F04F'];
      for (let i = 0; i < count; i++) {
        const laser = document.createElement('div');
        laser.className = 'laser-burst';
        laser.style.setProperty('--angle', `${(360 / count) * i + Math.random() * 12}deg`);
        laser.style.setProperty('--laser-color', colors[i % colors.length]);
        layer.appendChild(laser);
        setTimeout(() => laser.remove(), 800);
      }
    }

    function launchConfetti(count) {
      if (prefersReducedMotion() || isLegacyFx()) return;
      const layer = document.getElementById('burst-layer');
      if (!layer) return;
      const colors = ['#FFD700', '#FF2FA8', '#22D9FF', '#A8F04F', '#FF7A90', '#9370DB'];
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.setProperty('--cx', `${Math.random() * 100}%`);
        c.style.setProperty('--csize', `${6 + Math.random() * 8}px`);
        c.style.setProperty('--ccolor', colors[i % colors.length]);
        c.style.setProperty('--crot', `${Math.random() * 360}deg`);
        c.style.setProperty('--cdx', `${(Math.random() - 0.5) * 280}px`);
        c.style.setProperty('--clife', `${1800 + Math.random() * 1400}ms`);
        layer.appendChild(c);
        setTimeout(() => c.remove(), 3400);
      }
    }

    function launchShootingStar() {
      if (prefersReducedMotion() || isLegacyFx()) return;
      const layer = document.getElementById('burst-layer');
      if (!layer) return;
      const colors = ['#FFD700', '#65D6FF', '#FF69B4', '#A8F04F'];
      const star = document.createElement('div');
      star.className = 'shooting-star';
      const startX = Math.random() * 60;
      const startY = Math.random() * 30;
      star.style.setProperty('--ssx', `${startX}%`);
      star.style.setProperty('--ssy', `${startY}%`);
      star.style.setProperty('--ssdx', `${200 + Math.random() * 200}px`);
      star.style.setProperty('--ssdy', `${150 + Math.random() * 150}px`);
      star.style.setProperty('--ssc', colors[Math.floor(Math.random() * colors.length)]);
      layer.appendChild(star);
      setTimeout(() => star.remove(), 1500);
    }

    function launchBurst(isCorrect, isBig) {
      const layer = document.getElementById('burst-layer');
      const app = document.getElementById('app');
      if (!layer || !app) return;
      if (prefersReducedMotion()) return;

      const legacy = isLegacyFx();
      const appRect = app.getBoundingClientRect();
      const target = document.querySelector('.screen.active .question-area, .screen.active .score-board') || document.querySelector('.question-area');
      if (!target) return;
      const questionRect = target.getBoundingClientRect();
      const centerX = questionRect.left - appRect.left + questionRect.width / 2;
      const centerY = questionRect.top - appRect.top + questionRect.height / 2;
      const count = legacy
        ? (isBig ? 42 : (isCorrect ? 28 : 18))
        : (isBig ? 90 : (isCorrect ? 60 : 36));
      const symbols = isCorrect
        ? (legacy ? ['★', '×', '+', '♪'] : ['★', '✦', '♥', '♪', '✿', '◆', '✺'])
        : (legacy ? ['×', '?', '！'] : ['×', '?', '！', '✗']);
      const colors = isCorrect
        ? (legacy
          ? ['#FFD700', '#FF69B4', '#4ECDC4', '#A8F04F', '#65D6FF']
          : ['#FFD700', '#FF69B4', '#4ECDC4', '#A8F04F', '#65D6FF', '#FF2FA8', '#FFFFFF'])
        : ['#FF7A90', '#9370DB', '#FFD700'];

      for (let i = 0; i < count; i++) {
        const spark = document.createElement('span');
        const angle = (Math.PI * 2 * i / count) + Math.random() * (legacy ? 0.45 : 0.6);
        const distance = legacy
          ? (isBig ? 180 : 120) + Math.random() * (isBig ? 120 : 70)
          : (isBig ? 240 : 160) + Math.random() * (isBig ? 180 : 110);
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance - Math.random() * (legacy ? 45 : 70);
        spark.className = 'spark';
        spark.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        spark.style.setProperty('--left', `${centerX}px`);
        spark.style.setProperty('--top', `${centerY}px`);
        spark.style.setProperty('--x', `${x}px`);
        spark.style.setProperty('--y', `${y}px`);
        spark.style.setProperty('--spin', `${(Math.random() * (legacy ? 720 : 1080) - (legacy ? 360 : 540)).toFixed(0)}deg`);
        spark.style.setProperty('--spark-color', colors[i % colors.length]);
        spark.style.setProperty('--spark-size', legacy
          ? `${14 + Math.random() * (isBig ? 18 : 12)}px`
          : `${18 + Math.random() * (isBig ? 28 : 18)}px`);
        spark.style.setProperty('--spark-life', legacy
          ? `${780 + Math.random() * 420}ms`
          : `${900 + Math.random() * 600}ms`);

        setTimeout(() => spark.remove(), legacy ? 1300 : 1600);
      }

      if (legacy) return;

      // 二次バースト（少し遅れて 別方向に）

        setTimeout(() => {
          const secondCount = isBig ? 50 : 30;
          for (let i = 0; i < secondCount; i++) {
            const spark = document.createElement('span');
            const angle = (Math.PI * 2 * i / secondCount) + Math.PI / secondCount;
            const distance = (isBig ? 200 : 140) + Math.random() * 100;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance - Math.random() * 50;
            spark.className = 'spark';
